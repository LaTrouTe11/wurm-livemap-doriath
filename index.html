
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[QC/FR/CAN] QBC Doriath - LiveMap</title>
    <!-- Infrastructure CDN stable Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com" />
    <script src="https://unpkg.com"></script>
    <link rel="stylesheet" href="css/style.css" />
    <style>
        /* Force l'affichage et corrige les conflits du fichier style.css */
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #1a1a24; }
        #gui { position: absolute; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        #sidebar { pointer-events: auto; background: #22222b !important; color: #fff !important; border-right: 2px solid #2196F3; left: 0 !important; }
        #sidebar .block { display: block !important; border-bottom: 1px solid #3a3a4a !important; }
        #sidebar h1 { color: #2196F3; font-size: 16px; margin-bottom: 5px; }
        #sidebar p { color: #888; font-size: 12px; }
        
        /* Ajustement dynamique de la zone cartographique à droite du menu */
        #map { position: absolute; top: 0; bottom: 0; right: 0; left: 240px !important; width: calc(100vw - 240px) !important; height: 100vh; background-color: #15151c; z-index: 1; pointer-events: auto; }
        
        .filter-item { display: flex; align-items: center; gap: 8px; padding: 6px 0; font-size: 13px; cursor: pointer; }
        .filter-item input { cursor: pointer; }
    </style>
</head>
<body>

    <!-- Structure GUI compatible avec votre style.css -->
    <div id="gui">
        <div id="sidebar" class="loaded">
            <div class="block padding">
                <h1>QBC Doriath</h1>
                <p id="playercount">Interactive LiveMap</p>
            </div>
            <div class="block">
                <div style="font-size: 11px; text-transform: uppercase; color: #666; font-weight: bold; margin-bottom: 10px; letter-spacing: 1px;">Calques</div>
                <label class="filter-item"><input type="checkbox" id="chk-villages" checked onchange="toggleLayer('villages')"> Villages (Deeds)</label>
                <label class="filter-item"><input type="checkbox" id="chk-towers" checked onchange="toggleLayer('towers')"> Tours de garde</label>
            </div>
            <div class="block">
                <div style="font-size: 11px; text-transform: uppercase; color: #666; font-weight: bold; margin-bottom: 10px; letter-spacing: 1px;">Index</div>
                <div style="padding: 6px 8px; background: #2a2a35; border-radius: 4px; cursor: pointer; font-size: 13px; border-left: 3px solid #2196F3;" onclick="focusOn(2048, 2048)">
                    📍 Centre du Monde
                </div>
            </div>
        </div>
    </div>

    <!-- Conteneur Leaflet de rendu -->
    <div id="map"></div>

    <script>
        window.addEventListener('load', function() {
            window.WurmMapGen = window.WurmMapGen || {};

            // Initialisation de la carte Leaflet Simple
            var map = L.map('map', {
                crs: L.CRS.Simple,
                minZoom: 0,
                maxZoom: 5,
                zoomControl: true,
                attributionControl: false
            });

            // Cadrage géométrique de votre grille 4k (4096 x 4096)
            var mapBounds = new L.LatLngBounds(
                map.unproject([0, 4096], 5),
                map.unproject([4096, 0], 5)
            );
            map.fitBounds(mapBounds);
            map.setZoom(2);

            // CORRECTIONS DES COORDONNÉES INVERSÉES (tms: true débloque l'affichage des images Wurm)
            L.tileLayer('images/{x}-{y}.png', {
                tileSize: 256,
                noWrap: true,
                tms: true
            }).addTo(map);

            var layers = {
                villages: L.layerGroup().addTo(map),
                towers: L.layerGroup().addTo(map)
            };

            window.toggleLayer = function(type) {
                var chk = document.getElementById('chk-' + type);
                if (chk.checked) { map.addLayer(layers[type]); } else { map.removeLayer(layers[type]); }
            };

            window.focusOn = function(x, y) {
                map.setView(map.unproject([x, y], 5), 4);
            };

            // Récupération et conversion dynamique des données JSON
            fetch('data/villages.json')
                .then(res => res.json())
                .then(data => {
                    data.forEach(v => {
                        var marker = L.marker(map.unproject([v.x, v.y], 5));
                        marker.bindPopup(`<b>${v.name}</b><br>Maire: ${v.mayor}`);
                        layers.villages.addLayer(marker);
                    });
                }).catch(() => console.log("En attente de synchronisation des paquets..."));
        });
    </script>
</body>
</html>
