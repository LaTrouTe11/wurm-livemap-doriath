<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[QC/FR/CAN] QBC Doriath - LiveMap</title>
    <style>
        body { margin: 0; padding: 0; background-color: #1a1a24; font-family: sans-serif; color: white; text-align: center; }
        .header { background: #222230; padding: 15px; border-bottom: 3px solid #2196F3; }
        h1 { margin: 0; font-size: 20px; color: #2196F3; }
        .map-container { width: 100vw; height: calc(100vh - 60px); display: flex; align-items: center; justify-content: center; overflow: auto; }
        /* Affiche l'image de la carte générée en mode brut et pixelisé pour le pixel-art */
        .wurm-map-brute { image-rendering: pixelated; max-width: 100%; max-height: 100%; border: 2px solid #333; }
        .btn-diagnostic { position: absolute; bottom: 20px; right: 20px; background: #2196F3; color: white; padding: 10px 15px; text-decoration: none; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Carte du Serveur : Doriath (Mise à jour automatique)</h1>
    </div>

    <div class="map-container">
        <!-- On force l'affichage de l'image de rendu racine générée par WurmMapGen -->
        <img src="images/9-8.png" class="wurm-map-brute" alt="Chargement du terrain de Doriath en cours..." onerror="this.src='images/0-0.png'">
    </div>

    <a href="diagnostic.html" class="btn-diagnostic">🛠 Panel Diagnostic</a>

</body>
</html>
