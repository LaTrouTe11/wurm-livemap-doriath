<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QBC LiveMap - Doriath</title>
    <link rel="stylesheet" href="https://unpkg.com" />
    <style>
        body { margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; }
        #map { flex-grow: 1; width: 100%; height: 100%; }
    </style>
</head>
<body data-realtime="false">

    <div id="map"></div>

    <script>
        // Déclaration immédiate de l'objet global pour éviter l'erreur "not defined"
        window.WurmMapGen = window.WurmMapGen || {};
        
        // Chargement ordonné et séquentiel des dépendances de la carte
        ['util.js', 'markers.js', 'map.js', 'gui.js', 'main.js'].forEach(function(src) { 
            var s = document.createElement('script'); 
            s.src = src; 
            s.defer = true; 
            document.body.appendChild(s); 
        });
    </script>
</body>
</html>
