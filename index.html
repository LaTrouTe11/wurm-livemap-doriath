<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QBC LiveMap - Doriath</title>
    <!-- Inclure ici les liens CSS/JS nécessaires (Leaflet, Vue, etc.) -->
    <link rel="stylesheet" href="css/style.css" />
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; right: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #gui { position: absolute; z-index: 10; pointer-events: none; }
        #sidebar, #sidebar-toggle, #search { pointer-events: auto; }
    </style>
</head>
<body>
    <div id="gui">
        <!-- Structure du menu (sidebar, recherche, etc.) -->
    </div>
    <div id="map"></div>
    <!-- Point d'injection pour le script JS -->
    <div id="inject-zone"></div>
</body>
</html>
