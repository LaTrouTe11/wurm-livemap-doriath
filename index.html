<!DOCTYPE html>
<html>
<head>
	<title>[QC/FR/CAN] QBC Doriath |PVE | MODS 4 K 2025 - WU MapGen</title>
	<meta charset="utf-8"/>
	<base href="/wurm-livemap-doriath/">
	<meta name="viewport" content="initial-scale=1.0, user-scalable=no"/>

	<script>
		(function() {
			var host = 'cdnjs.' + 'cloudflare.com';
			var l = document.createElement('link');
			l.rel = 'stylesheet';
			l.crossOrigin = 'anonymous';
			l.href = ['https:/', host, 'ajax', 'libs', 'leaflet', '1.2.0', 'leaflet.css'].join('/');
			document.head.appendChild(l);
		})();
	</script>
	<link rel="stylesheet" href="https://googleapis.com">
	<link rel="stylesheet" href="dist/Leaflet.Coordinates-0.1.5.css">
	<link rel="stylesheet" href="css/style.css">
</head>
<body data-realtime="false">

<div id="gui" :class="{sidebar: sidebarVisible}">
	<a id="sidebar-toggle" class="absolute transition z-gui" @click="sidebarVisible = !sidebarVisible">≡</a>
	<div id="sidebar" class="absolute transition z-gui" :class="{loaded: loaded}">
		<div class="block padding">
			<!-- TITRE DU SERVEUR -->
			<h1 style="color: #ffcc00; text-shadow: 0px 2px 4px rgba(0,0,0,0.8); font-size: 18px; letter-spacing: 0.5px; text-align: center; margin-bottom: 8px; line-height: 1.3;">[QC/FR/CAN] QBC Doriath |PVE | MODS 4 K 2025</h1>
			
			<!-- BOUTON DE STATUT DU SERVEUR -->
			<div style="text-align: center; margin-bottom: 14px;">
				<a href="https://wurm-unlimited.com" target="_blank" rel="noreferrer noopener" style="text-decoration: none; display: inline-block;">
					<div style="background: #1a1a1a; border: 2px solid #00ccff; padding: 8px 16px; border-radius: 6px; font-family: 'Roboto', sans-serif; font-size: 12px; font-weight: bold; color: #00ccff; letter-spacing: 0.5px; box-shadow: 0 0 8px rgba(0,204,255,0.3); text-shadow: 1px 1px 2px #000;">
						🟢 SERVEUR : ONLINE
					</div>
				</a>
			</div>

			<!-- ENCADRE DE SYNCHRONISATION FIXE -->
			<div style="background: rgba(0, 0, 0, 0.5); border: 2px solid #00ffb7; padding: 8px; border-radius: 6px; font-size: 11px; color: #00ffb7; font-weight: bold; text-align: center; line-height: 1.4; font-family: Roboto, sans-serif; box-shadow: 0 0 10px rgba(0,255,183,0.2);">
				Dernière compilation réussie<br>
				<span id="live-sync-date" style="color:#fff; font-size:12px;">2026-06-27 a 00:04:07</span>
			</div>
			
		</div>

		<div class="block">
			<label for="option-show-villages" class="flex">
				<input type="checkbox" class="transition" id="option-show-villages" v-model="showVillages">
				<span>Show deeds</span>
			</label>
			<label for="option-show-village-borders" class="flex transition" :class="{inactive:!showVillages}">
				<input type="checkbox" class="transition" id="option-show-village-borders" v-model="showVillageBorders">
				<span>Show deed borders</span>
			</label>
		</div>

		<div class="block">
			<label for="option-show-towers" class="flex">
				<input type="checkbox" class="transition" id="option-show-towers" v-model="showTowers"> Show guard towers
			</label>
			<label for="option-show-tower-borders" class="flex transition" :class="{inactive:!showTowers}">
				<input type="checkbox" class="transition" id="option-show-tower-borders" v-model="showTowerBorders">
				<span>Show guard tower borders</span>
			</label>
		</div>

		<div class="block">
			<label for="option-show-portals" class="flex">
				<input type="checkbox" class="transition" id="option-show-portals" v-model="showPortals"> Show portals
			</label>
		</div>

		<div class="block">
			<label for="option-show-structures" class="flex">
				<input type="checkbox" class="transition" id="option-show-structures" v-model="showStructures"> Show structures
			</label>
		</div>

		<div class="block attribution">
			<p>
				<a href="https://github.com" target="_blank" rel="noreferrer noopener">WurmMapGen</a>
				powered by <a href="http://leafletjs.com" target="_blank" rel="noreferrer noopener">Leaflet</a>
			</p>
			<p>Developed and maintained by <a href="https://github.com">woubuc</a></p>
			<p id="repo-sync-label">Based on code by <a href="https://github.com">Garrett92</a></p>
		</div>
	</div>

	<div id="search" class="absolute transition z-gui" :class="{open: searchResultsOpen}">
		<input v-model="searchQuery" placeholder="Search map for deeds, players, ..." autocomplete="off">
		<div id="search-results" v-if="searchQuery !== ''">
			<div v-for="result in searchResults" :class="result.type" v-html="result.label" @click="focusMap(result.x, result.y); searchQuery = '';"></div>
		</div>
	</div>

	<div id="map" class="absolute transition z-page"></div>
</div>

<script crossorigin="anonymous">
	(function() {
		var cdnjs = 'cdnjs.' + 'cloudflare.com';
		var jsdelivr = 'cdn.' + 'jsdelivr.net';
		var urls = [
			['https:/', cdnjs, 'ajax', 'libs', 'leaflet', '1.2.0', 'leaflet.js'].join('/'),
			'dist/Leaflet.Coordinates-0.1.5.min.js',
			['https:/', jsdelivr, 'npm', 'cookies-js@1.2.3', 'dist', 'cookies.min.js'].join('/'),
			['https:/', cdnjs, 'ajax', 'libs', 'fetch', '2.0.4', 'fetch.min.js'].join('/'),
			['https:/', cdnjs, 'ajax', 'libs', 'es6-promise', '4.2.8', 'es6-promise.auto.min.js'].join('/'),
			['https:/', cdnjs, 'ajax', 'libs', 'vue', '2.5.9', 'vue.min.js'].join('/')
		];
		
		function loadNext(index) {
			if (index >= urls.length) {
				startApplication();
				return;
			}
			var s = document.createElement('script');
			s.src = urls[index];
			s.crossOrigin = 'anonymous';
			s.onload = function() { loadNext(index + 1); };
			document.body.appendChild(s);
		}
		
		function startApplication() {
			window.WurmMapGen = {};
			var modules = ['app/util.js', 'app/markers.js', 'app/map.js', 'app/gui.js', 'app/main.js'];
			modules.forEach(function(src) {
				var s = document.createElement('script');
				s.src = src;
				s.defer = true;
				document.body.appendChild(s);
			});
			activateBulleInterceptor();
		}

		// LE TRADUCTEUR AUTONOME ET ABSOLU : Traduit le texte brut de l'écran sans dépendre de map.js ni des JSON
		function activateBulleInterceptor() {
			setTimeout(function() {
				if (window.WurmMapGen && WurmMapGen.map && WurmMapGen.map.map) {
					var mapInstance = WurmMapGen.map.map;
					
					mapInstance.on('popupopen', function(e) {
						var popup = e.popup;
						var content = popup.getContent();
						
						// Applique de force les options de positionnement et de décalage anti-tremblement
						popup.options.keepInView = true;
						popup.options.autoPan = true;
						popup.options.offset = L.point(0, -25);
						popup.options.autoPanPaddingTopLeft = L.point(50, 320);
						popup.options.autoPanPaddingBottomRight = L.point(50, 50);
						
						if (content && (content.indexOf('Mayor:') !== -1 || content.indexOf('Maire :') !== -1)) {
							// 1. Extraction du Nom du Village
							var titleMatch = content.match(/<b>(.*?)<\/b>/);
							var villageName = titleMatch ? titleMatch[1] : 'Colonie';
							
							// 2. Extraction du Maire (prend ce qu'il y a après "Mayor:")
							var mayorMatch = content.match(/<b>Mayor:<\/b>\s*(.*?)(<br>|$)/i);
							var mayorName = mayorMatch ? mayorMatch[1] : 'Inconnu';
							
							// 3. Extraction des Citoyens
							var citizensMatch = content.match(/<b>Citizens:<\/b>\s*(.*?)(<br>|$)/i);
							var citizensCount = citizensMatch ? citizensMatch[1] : '1';
							
							// 4. Extraction du Motto / Slogan s'il existe
							var mottoMatch = content.match(/<i>(.*?)<\/i>/);
							var mottoText = mottoMatch ? mottoMatch[1] : '';
							
							// 5. Calcul des coordonnées géographiques directes depuis le clic
							var latlng = popup.getLatLng();
							var posX = Math.floor(latlng.lng);
							var posY = Math.floor(-latlng.lat);
							
							// RECONSTRUCTION FORCÉE DES COULEURS ET DES NOUVELLES OPTIONS
							var newContent = [
								'<div align="center"><b style="color: #FFD700; font-size: 15px; text-shadow: 1px 2px 3px #000; font-family: Roboto, sans-serif; letter-spacing: 0.5px;">' + villageName + '</b><br>',
								(mottoText ? '<i style="color: #bbb; font-size: 11px;">' + mottoText + '</i>' : '') + '</div>',
								'<div style="margin-top: 8px; font-size: 11px; line-height: 1.4; color: #fff;">',
								'<b>Maire :</b> <span style="color: #00FF7F; font-weight: bold;">' + mayorName + '</span><br>',
								'<b>Citoyens :</b> <span style="color: #00FFFF; font-weight: bold;">' + citizensCount + '</span><br>',
								'<b>Créé en :</b> 2026<br>',
								'<b>Position :</b> <span style="font-family: monospace;">' + posX + ' x, ' + posY + ' y</span>',
								'</div>'
							].join('');
							
							popup.setContent(newContent);
							popup.update();
						}
					});
				} else {
					activateBulleInterceptor();
				}
			}, 1000);
		}

		loadNext(0);
	})();
</script>
</body>
</html>
