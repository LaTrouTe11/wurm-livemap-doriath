<!DOCTYPE html>
<html>
<head>
	<title>[QC/FR/CAN] QBC Doriath |PVE | MODS 8 K 2025 - WU MapGen</title>
	<meta charset="utf-8"/>
	<meta name="viewport" content="initial-scale=1.0, user-scalable=no"/>

	<link rel="stylesheet" href="https://unpkg.com">
	<link rel="stylesheet" href="https://googleapis.com">
	<link rel="stylesheet" href="dist/Leaflet.Coordinates-0.1.5.css">
	<link rel="stylesheet" href="css/style.css">
</head>
<body data-realtime="false">

<!-- Interface elements -->
<div id="gui" :class="{sidebar: sidebarVisible}">
	<a id="sidebar-toggle" class="absolute transition z-gui" @click="sidebarVisible = !sidebarVisible">≡</a>
	<div id="sidebar" class="absolute transition z-gui" :class="{loaded: loaded}">
		<div class="block padding">
			<h1>[QC/FR/CAN] QBC Doriath |PVE | MODS 8 K 2025</h1>
			
			<!-- ENCADRÉ DE MISE À JOUR : Stylisé et sécurisé pour ne pas bloquer Leaflet -->
			<div style="margin-top: 10px; background: rgba(0, 0, 0, 0.4); border: 1px solid #444; padding: 6px 10px; border-radius: 4px; font-size: 11px;">
				📅 Synchro : <span id="update-date" style="color: #00ffb7; font-weight: bold;">En ligne</span>
				<div id="update-details" style="margin-top: 4px; padding-top: 4px; border-top: 1px dashed #555; color: #aaa; font-size: 10px; line-height: 1.4;">Chargement...</div>
			</div>
		</div>

		<div class="block">
			<label for="option-show-villages" class="flex">
				<input type="checkbox" class="transition" id="option-show-villages" v-model="showVillages">
				<span>Show deeds</span>
			</label>
			<label for="option-show-village-borders" class="flex transition" :class="{inactive:!showVillages}">
				<input type="checkbox" class="transition" id="option-show-village-borders" v-model="showVillageBorders">
				<span>Show deed borders</span>
			</label>
		</div>

		<div class="block">
			<label for="option-show-towers" class="flex">
				<input type="checkbox" class="transition" id="option-show-towers" v-model="showTowers"> Show guard towers
			</label>
			<label for="option-show-tower-borders" class="flex transition" :class="{inactive:!showTowers}">
				<input type="checkbox" class="transition" id="option-show-tower-borders" v-model="showTowerBorders">
				<span>Show guard tower borders</span>
			</label>
		</div>

		<div class="block">
			<label for="option-show-portals" class="flex">
				<input type="checkbox" class="transition" id="option-show-portals" v-model="showPortals"> Show portals
			</label>
		</div>

		<div class="block">
			<label for="option-show-structures" class="flex">
				<input type="checkbox" class="transition" id="option-show-structures" v-model="showStructures"> Show structures
			</label>
		</div>

		<div class="block attribution">
			<p>
				<a href="https://github.com" target="_blank" rel="noreferrer noopener">WurmMapGen</a>
				powered by
				<a href="http://leafletjs.com" target="_blank" rel="noreferrer noopener">Leaflet</a>
			</p>

			<p>Developed and maintained by <a href="https://github.com">woubuc</a></p>
			<p>Based on code by <a href="https://github.com">Garrett92</a></p>
		</div>

	</div>

	<div id="search" class="absolute transition z-gui" :class="{open: searchResultsOpen}">
		<input v-model="searchQuery" placeholder="Search map for deeds, players, ..." autocomplete="off">
		<div id="search-results" v-if="searchQuery !== ''">
			<div v-for="result in searchResults" :class="result.type" v-html="result.label" @click="focusMap(result.x, result.y); searchQuery = '';"></div>
		</div>
	</div>

	<!-- Map container -->
	<div id="map" class="absolute transition z-page"></div>
</div>

<!-- Load dependencies -->
<script src="https://unpkg.com" defer integrity="sha384-ic4t376ZLdSPIUOxDpNXqU0UWe1c/2BkOXxiirQWAgKZzMJ6njfS1jdzbyMJbfil" crossorigin="anonymous"></script>
<script src="dist/Leaflet.Coordinates-0.1.5.min.js" defer></script>
<script src="https://unpkg.com" integrity="sha384-Sz/TO/SdmTLSbgJdFXq+xsTAMk7YO3Ydk/LaJbERL9zgiFOpl39JoxkpLNBl0kFo" crossorigin="anonymous"></script>
<script src="https://unpkg.com" defer integrity="sha384-KaKx4aJnrltBb2dne61B/MRPA4uRfQvv6YW99RgjHax8TRjFxcC4BC19EEX0te/6" crossorigin="anonymous"></script>
<script src="https://unpkg.com" defer integrity="sha384-LSmcy/rdMAgofokne7lmSBxJnXdRcj4SKZwPD+CE8At+QhWXRPvESLzhy/N2zHX+" crossorigin="anonymous"></script>
<script src="https://unpkg.com" defer integrity="sha384-zqrofuOynJ/XqmhOlwCW6O4dBXHCFqHlF9NP1NXopaE/7kBbN5QLwAvUiofvPrFi" crossorigin="anonymous"></script>

<!-- Load app -->
<script>window.WurmMapGen = {};</script>
<script type="text/javascript" defer src="app/util.js"></script>
<script type="text/javascript" defer src="app/markers.js"></script>
<script type="text/javascript" defer src="app/map.js"></script>
<script type="text/javascript" defer src="app/gui.js"></script>
<script type="text/javascript" defer src="app/main.js"></script>

<!-- SCRIPT DE SUIVI ISOLÉ ET SÉCURISÉ POUR ÉVITER LES BUGS VISUELS -->
<script>
  window.addEventListener('load', function() {
    setTimeout(function() {
      fetch('./data/timestamp.json')
        .then(function(res) { return res.json(); })
        .then(function(data) {
          if (data && data.last_update) {
            document.getElementById('update-date').innerText = data.last_update;
            document.getElementById('update-details').innerHTML = `📝 <b>Données :</b> ${data.fichiers}<br>🖼️ <b>Terrain :</b> ${data.images_neuves}`;
          }
        })
        .catch(function() {
          document.getElementById('update-date').innerText = "À jour";
          document.getElementById('update-details').innerText = "Vérification terminée";
        });
    }, 1000); // Attend 1 seconde pour laisser Leaflet dessiner la carte en premier
  });
</script>
</body>
</html>
