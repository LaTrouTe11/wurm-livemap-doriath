<!DOCTYPE html>
<html>
<head>
    <title>[QC/FR/CAN] QBC Doriath | PVE | MODS 8 K 2025 - WU MapGen</title>
    <meta charset="utf-8"/>
    <base href="/wurm-livemap-doriath/">
    <meta name="viewport" content="initial-scale=1.0, user-scalable=no"/>
    <link rel="stylesheet" href="dist/Leaflet.Coordinates-0.1.5.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .leaflet-container{overflow:hidden;-ms-touch-action:none;touch-action:none;background:#ddd;outline:0;font:12px/1.5 "Helvetica Neue",Arial,Helvetica,sans-serif}.leaflet-pane,.leaflet-tile,.leaflet-tile-container{position:absolute;left:0;top:0}.leaflet-pane{z-index:400}.leaflet-tile{-webkit-user-select:none;-moz-user-select:none;-user-select:none;-webkit-user-drag:none;white-space:nowrap}.leaflet-tile-loaded{visibility:inherit}.leaflet-map-pane svg{position:absolute;z-index:200}.leaflet-map-pane canvas{position:absolute;z-index:100}
    </style>
</head>
<body data-realtime="false">

<div id="gui" :class="{sidebar: sidebarVisible}">
    <a id="sidebar-toggle" class="absolute transition z-gui" @click="sidebarVisible = !sidebarVisible">≡</a>
    <div id="sidebar" class="absolute transition z-gui" :class="{loaded: loaded}">
        <div class="block padding">
            <h1>[QC/FR/CAN] QBC Doriath</h1>
        </div>

        <div class="block">
            <label for="option-show-villages" class="flex">
                <input type="checkbox" class="transition" id="option-show-villages" v-model="showVillages">
                <span>Show deeds</span>
            </label>
            <label for="option-show-village-borders" class="flex transition" :class="{inactive:!showVillages}">
                <input type="checkbox" class="transition" id="option-show-village-borders" v-model="showVillageBorders">
                <span>Show deed borders</span>
            </label>
        </div>

        <div class="block">
            <label for="option-show-towers" class="flex">
                <input type="checkbox" class="transition" id="option-show-towers" v-model="showTowers"> Show guard towers
            </label>
            <label for="option-show-tower-borders" class="flex transition" :class="{inactive:!showTowers}">
                <input type="checkbox" class="transition" id="option-show-tower-borders" v-model="showTowerBorders">
                <span>Show guard tower borders</span>
            </label>
        </div>

        <div class="block">
            <label for="option-show-portals" class="flex">
                <input type="checkbox" class="transition" id="option-show-portals" v-model="showPortals"> Show portals
            </label>
        </div>

        <div class="block">
            <label for="option-show-structures" class="flex">
                <input type="checkbox" class="transition" id="option-show-structures" v-model="showStructures"> Show structures
            </label>
        </div>

        <div class="block attribution">
            <p>
                <a href="https://github.com" target="_blank" rel="noreferrer noopener">WurmMapGen</a>
                powered by <a href="http://leafletjs.com" target="_blank" rel="noreferrer noopener">Leaflet</a>
            </p>
            <p>Developed and maintained by <a href="https://github.com">woubuc</a></p>
        </div>
    </div>

    <div id="search" class="absolute transition z-gui" :class="{open: searchResultsOpen}">
        <input v-model="searchQuery" placeholder="Search map..." autocomplete="off">
        <div id="search-results" v-if="searchQuery !== ''">
            <div v-for="result in searchResults" :class="result.type" v-html="result.label" @click="focusMap(result.x, result.y); searchQuery = '';"></div>
        </div>
    </div>

    <div id="map" class="absolute transition z-page"></div>
</div>

<!-- LEAFLET ENGINE (Brut sans aucun lien web externe) -->
<script>
!function(a,b){var c={};c.extend=function(a){for(var b=1;b<arguments.length;b++)for(var c in arguments[b])a[c]=arguments[b][c];return a},c.lastId=0,c.stamp=function(a){return a._leaflet_id=a._leaflet_id||++c.lastId,a._leaflet_id},a.L={version:"1.2.0",Util:c},a.L.Map=function(a){this._container=document.getElementById(a),this._layers={}},a.L.Map.prototype={addLayer:function(a){this._layers[c.stamp(a)]=a},setView:function(){return this}},a.L.tileLayer=function(){return{onAdd:function(){}}},a.L.CRS={Simple:{}},a.L.point=function(a,b){return{x:a,y:b}},a.L.latLng=function(a,b){return{lat:a,lng:b}}}(window);

<script>
!function(a){var b=function(a){this.sidebarVisible=!0,this.loaded=!0,this.showVillages=!0,this.showVillageBorders=!0,this.showTowers=!0,this.showTowerBorders=!0,this.showPortals=!0,this.showStructures=!0,this.searchQuery="",this.searchResults=[],this._data=a.data||{}};a.Vue=b}(window);
</script>

<script src="dist/Leaflet.Coordinates-0.1.5.min.js" defer></script>
<script>window.WurmMapGen = {};</script>
<script type="text/javascript" defer src="app/util.js"></script>
<script type="text/javascript" defer src="app/markers.js"></script>
<script type="text/javascript" defer src="app/map.js"></script>
<script type="text/javascript" defer src="app/gui.js"></script>
<script type="text/javascript" defer src="app/main.js"></script>
</body>
</html>
