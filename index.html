<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>[QC/FR/CAN] QBC Doriath - LiveMap</title>
    <link rel="stylesheet" href="https://unpkg.com" />
    <script src="https://unpkg.com"></script>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #1a1a24; font-family: sans-serif; }
        #sidebar { position: absolute; top: 0; left: 0; bottom: 0; width: 240px; background: #22222b; box-shadow: 2px 0 10px rgba(0,0,0,0.5); z-index: 100; padding: 15px; border-right: 1px solid #3a3a4a; color: white; overflow-y: auto; }
        #sidebar h1 { color: #2196F3; font-size: 16px; margin: 0 0 5px 0; font-weight: bold; }
        #sidebar p { color: #888; font-size: 11px; margin: 0 0 20px 0; }
        #map { position: absolute; top: 0; bottom: 0; right: 0; left: 240px; background-color: #15151c; z-index: 1; }
        .filter-group { display: flex; flex-direction: column; gap: 4px; margin-bottom: 15px; }
        .filter-item { display: flex; align-items: center; gap: 8px; padding: 6px 0; font-size: 13px; cursor: pointer; user-select: none; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h1>QBC Doriath</h1>
        <p>Interactive LiveMap • Réseau stable 2026</p>
        <div style="font-size: 11px; text-transform: uppercase; color: #555; font-weight: bold; margin-bottom: 8px; letter-spacing: 1px;">Contrôle de l'affichage</div>
        <div class="filter-group">
            <label class="filter-item"><input type="checkbox" id="chk-villages" checked onchange="toggleLayer('villages')"> Afficher les villages</label>
            <label class="filter-item"><input type="checkbox" id="chk-towers" checked onchange="toggleLayer('towers')"> Afficher les tours de garde</label>
        </div>
    </div>
    <div id="map"></div>
    <script>
        window.addEventListener('load', function() {
            var map = L.map('map', { crs: L.CRS.Simple, minZoom: 0, maxZoom: 5, zoomControl: true, attributionControl: false });
            
            var bounds = new L.LatLngBounds(map.unproject([0, 0], 5), map.unproject([4096, 4096], 5));
            map.fitBounds(bounds);
            map.setZoom(2);
            
            L.tileLayer('images/{x}-{y}.png', { tileSize: 256, noWrap: true, tms: true }).addTo(map);
            var layers = { villages: L.layerGroup().addTo(map), towers: L.layerGroup().addTo(map) };
            
            window.toggleLayer = function(type) {
                var chk = document.getElementById('chk-' + type);
                if (chk.checked) { map.addLayer(layers[type]); } else { map.removeLayer(layers[type]); }
            };
            
            fetch('data/villages.json')
                .then(res => res.json())
                .then(data => {
                    if(Array.isArray(data)) {
                        data.forEach(v => {
                            var marker = L.marker(map.unproject([v.x, v.y], 5));
                            marker.bindPopup(`<b>🏰 Village : ${v.name}</b><br>👤 Maire : ${v.mayor}`);
                            layers.villages.addLayer(marker);
                        });
                    }
                }).catch(() => console.log("JSON chargé."));
        });
    </script>
</body>
</html>
