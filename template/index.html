<!DOCTYPE html>
<html>
<head>
	<title>{{serverName}} - WU MapGen</title>
	<meta charset="utf-8"/>
	<meta name="viewport" content="initial-scale=1.0, user-scalable=no"/>
	<script>
		(function() {
			var styleLink = document.createElement('link');
			styleLink.rel = 'stylesheet';
			styleLink.crossOrigin = 'anonymous';
			var host = ['unpkg', 'com'].join('.');
			styleLink.href = 'https://' + host + '/leaflet@1.2.0/dist/leaflet.css';
			document.head.appendChild(styleLink);
		})();
	</script>
	<link rel="stylesheet" href="dist/Leaflet.Coordinates-0.1.5.css">
	<link rel="stylesheet" href="css/style.css">
	<style>
		.leaflet-popup-content-wrapper { background: rgba(45, 45, 45, 0.88) !important; border: 2px solid #ffcc00 !important; border-radius: 8px !important; padding: 0 !important; }
		.leaflet-popup-content { color: #ffffff !important; font-family: 'Roboto', sans-serif !important; font-size: 12px !important; margin: 12px !important; }
		.txt-m { color: #00FF7F !important; font-weight: bold; }
		.txt-c { color: #ffffff !important; font-weight: bold; }
		.txt-x { color: #00ffff !important; font-family: monospace; font-weight: bold; }
		.txt-y { color: #00FF7F !important; font-family: monospace; font-weight: bold; }
		.btn-comm { display: block !important; text-align: center !important; text-decoration: none !important; font-size: 11px !important; font-weight: bold !important; padding: 8px !important; margin: 8px 0 !important; border-radius: 4px !important; }
		.btn-web { background: #ffcc00 !important; color: #111111 !important; }
		.btn-disc { background: #5865F2 !important; color: #ffffff !important; }
	</style>
</head>
<body data-realtime="{{enableRealtimeMarkers}}">

<div id="gui" :class="{sidebar: sidebarVisible}">
	<a id="sidebar-toggle" class="absolute transition z-gui" @click="sidebarVisible = !sidebarVisible">≡</a>
	<div id="sidebar" class="absolute transition z-gui" :class="{loaded: loaded}">
		
		<div style="padding: 15px; border-bottom: 1px solid #444; text-align: center; background: #222;">
			<h1 style="color: #ffcc00; font-size: 18px; margin-bottom: 10px; font-family: 'Roboto', sans-serif;">{{serverName}}</h1>
			<a href="https://wurm-unlimited.com" target="_blank" style="display: block; width: 100%;">
				<img src="https://wurm-unlimited.com/banners/half-banner-1.png" alt="Server Status" style="width: 100%; border-radius: 4px;">
			</a>
		</div>

		<div class="block">
			<strong style="color: #ffcc00; font-size: 12px;">🌐 Community :</strong>
			<a href="https://wurm-unlimited.com" target="_blank" class="btn-comm btn-web">🔗 SERVER WEB PAGE</a>
			<a href="https://discord.gg" target="_blank" class="btn-comm btn-disc">💬 JOIN DISCORD</a>
		</div>

		{{#showDeeds}}
		<div class="block">
			<strong style="color: #ffcc00; font-size: 12px;">📍 Deeds :</strong>
			<label class="flex"><input type="checkbox" v-model="showVillages"> Show deeds</label>
		</div>
		{{/showDeeds}}

		<div class="block attribution">
			<p>WurmMapGen powered by Leaflet</p>
			<div style="border: 1px solid #ffcc00; padding: 6px; font-size: 10px; color: #ffcc00; text-align: center;">
				Last update :<br><span id="live-sync-date" style="color:#fff;">2026-06-27</span>
			</div>
		</div>
	</div>
	
	<div id="search" class="absolute transition z-gui" :class="{open: searchQuery.length > 0 && searchResults.length > 0}">
		<input type="text" placeholder="Search..." v-model="searchQuery" @keyup.esc="searchQuery = ''">
		<div id="search-results">
			<div v-for="result in searchResults" :class="result.type" @click="clickResult(result)">
				<p><strong>{{ result.name }}</strong></p>
				<p class="small">{{ result.text }}</p>
			</div>
		</div>
	</div>

	<div id="map" class="absolute transition z-page"></div>
</div>

<script src="https://unpkg.com/leaflet@1.2.0/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/vue/2.5.9/vue.min.js"></script>
<script>
    // Chargement des modules via le robot (déjà présent dans votre logique de loader)
    (function() {
        var startApp = function() {
            window.WurmMapGen = {};
            ['app/util.js', 'app/markers.js', 'app/map.js', 'app/gui.js', 'app/main.js'].forEach(function(src) { 
                var s = document.createElement('script'); s.src = src; s.defer = true; document.body.appendChild(s); 
            });
        };
        startApp();
    })();
</script>
</body>
</html>
