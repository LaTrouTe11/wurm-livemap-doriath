<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>QBC LiveMap - Doriath</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; background: #1a1a1a; }
        #map { flex-grow: 1; width: 100%; }
        .header { padding: 10px; background: #000; color: #fff; text-align: center; font-family: sans-serif; }
    </style>
</head>
<body data-realtime="true">

    <div class="header">
        QBC LiveMap - Doriath
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>

    <script src="app/util.js"></script>
    <script src="app/markers.js"></script>
    <script src="app/map.js"></script>
    <script src="app/gui.js"></script>
    <script src="app/main.js"></script>

</body>
</html>
