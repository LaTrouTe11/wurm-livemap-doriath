<!DOCTYPE html>
<html>
<head>
	<title>{{serverName}} - WU MapGen</title>
	<meta charset="utf-8"/>
	<meta name="viewport" content="initial-scale=1.0, user-scalable=no"/>
	
	<!-- Chargement direct sans blocage de sécurité ni problème d adresse -->
	<link rel="stylesheet" href="https://cloudflare.com">
	<link rel="stylesheet" href="https://googleapis.com">
	<link rel="stylesheet" href="dist/Leaflet.Coordinates-0.1.5.css">
	<link rel="stylesheet" href="css/style.css">
	
	<style>
		/* Style médiéval haute visibilité noir et or */
		.leaflet-popup-content-wrapper {
			background: #111111 !important;
			border: 2px solid #ffcc00 !important;
			box-shadow: 0px 4px 10px rgba(0,0,0,0.9) !important;
			border-radius: 8px !important;
		}
		.leaflet-popup-tip {
			background: #111111 !important;
			border: 1px solid #ffcc00 !important;
		}
		.leaflet-popup-content {
			color: #ffffff !important;
			font-family: 'Roboto', sans-serif !important;
			font-size: 12px !important;
		}
		.leaflet-popup-content b { color: #FFD700 !important; }
		.txt-m { color: #00FF7F !important; font-weight: bold; }
		.txt-c { color: #00FFFF !important; font-weight: bold; }
		.txt-p { color: #ffcc00 !important; font-family: monospace; font-weight: bold; }
	</style>
</head>
<body data-realtime="{{enableRealtimeMarkers}}">

<div id="gui" :class="{sidebar: sidebarVisible}">
	<a id="sidebar-toggle" class="absolute transition z-gui" @click="sidebarVisible = !sidebarVisible">≡</a>
	<div id="sidebar" class="absolute transition z-gui" :class="{loaded: loaded}">
		<div class="block padding">
			<!-- TITRE DU SERVEUR -->
			<h1 style="color: #ffcc00; text-shadow: 0px 2px 4px rgba(0,0,0,0.8); font-size: 18px; text-align: center; margin-bottom: 8px; line-height: 1.3;">{{serverName}}</h1>
			
			<!-- BOUTON DE STATUT DU SERVEUR -->
			<div style="text-align: center; margin-bottom: 14px;">
				<a href="https://wurm-unlimited.com" target="_blank" rel="noreferrer noopener" style="text-decoration: none;">
					<div style="background: #1a1a1a; border: 2px solid #00ccff; padding: 8px 16px; border-radius: 6px; font-family: 'Roboto', sans-serif; font-size: 12px; font-weight: bold; color: #00ccff; box-shadow: 0 0 8px rgba(0,204,255,0.3); text-shadow: 1px 1px 2px #000;">
						🟢 SERVEUR : ONLINE
					</div>
				</a>
			</div>

			<!-- ENCADRE DE SYNCHRONISATION FIXE -->
			<div style="background: rgba(0, 0, 0, 0.5); border: 2px solid #00ffb7; padding: 8px; border-radius: 6px; font-size: 11px; color: #00ffb7; font-weight: bold; text-align: center;">
				Dernière compilation réussie<br>
				<span id="live-sync-date" style="color:#fff; font-size:12px;">2026-06-26 a 22:32:10</span>
			</div>
		</div>

		{{#showDeeds}}
		<div class="block">
			<label for="option-show-villages" class="flex"><input type="checkbox" id="option-show-villages" v-model="showVillages"> <span>Show deeds</span></label>
			<label for="option-show-village-borders" class="flex" :class="{inactive:!showVillages}"><input type="checkbox" id="option-show-village-borders" v-model="showVillageBorders"> <span>Show deed borders</span></label>
		</div>
		{{/showDeeds}}
		{{#showGuardTowers}}
		<div class="block">
			<label for="option-show-towers" class="flex"><input type="checkbox" id="option-show-towers" v-model="showTowers"> Show guard towers</label>
			<label for="option-show-tower-borders" class="flex" :class="{inactive:!showTowers}"><input type="checkbox" id="option-show-tower-borders" v-model="showTowerBorders"> <span>Show guard tower borders</span></label>
		</div>
		{{/showGuardTowers}}
		{{#showStructures}}
		<div class="block"><label for="option-show-structures" class="flex"><input type="checkbox" id="option-show-structures" v-model="showStructures"> Show structures</label></div>
		{{/showStructures}}

		<div class="block attribution">
			<p><a href="https://github.com" target="_blank">WurmMapGen</a> powered by <a href="http://leafletjs.com" target="_blank">Leaflet</a></p>
		</div>
	</div>
	<div id="map" class="absolute transition z-page"></div>
</div>

<script crossorigin="anonymous">
	(function() {
		var urls = [
			'https://cloudflare.com',
			'dist/Leaflet.Coordinates-0.1.5.min.js',
			'https://jsdelivr.net',
			'https://cloudflare.com',
			'https://cloudflare.com',
			'https://cloudflare.com'
		];
		
		function loadNext(idx) {
			if (idx >= urls.length) { startApp(); return; }
			var s = document.createElement('script');
			s.src = urls[idx]; s.crossOrigin = 'anonymous'; s.onload = function() { loadNext(idx + 1); };
			document.body.appendChild(s);
		}
		
		function startApp() {
			window.WurmMapGen = {};
			var mods = ['app/util.js', 'app/markers.js', 'app/map.js', 'app/gui.js', 'app/main.js'];
			mods.forEach(function(src) {
				var s = document.createElement('script'); s.src = src; s.defer = true; document.body.appendChild(s);
			});
			activatePanAndTranslate();
		}

		function activatePanAndTranslate() {
			setTimeout(function() {
				if (window.WurmMapGen && WurmMapGen.map && WurmMapGen.map.map) {
					var mapInstance = WurmMapGen.map.map;
					mapInstance.on('popupopen', function(e) {
						var popup = e.popup;
						var html = popup.getContent();
						
						popup.options.keepInView = true;
						popup.options.autoPan = true;
						popup.options.offset = L.point(0, -15);
						popup.options.autoPanPaddingTopLeft = L.point(50, 280);
						popup.options.autoPanPaddingBottomRight = L.point(50, 50);
						
						if (html && (html.indexOf('Mayor:') !== -1 || html.indexOf('Maire :') !== -1 || html.indexOf('Citizens:') !== -1)) {
							var latlng = popup.getLatLng();
							var px = Math.floor(latlng.lng);
							var py = Math.floor(-latlng.lat);
							
							var cleanHtml = html
								.replace(/Mayor:/g, 'Maire : <span class="txt-m">')
								.replace(/Maire :/g, 'Maire : <span class="txt-m">')
								.replace(/Citizens:/g, '</span>Citoyens : <span class="txt-c">')
								.replace(/Citoyens :/g, '</span>Citoyens : <span class="txt-c">')
								.replace(/Founded:/g, '</span>Créé le : <span>')
								.replace(/Créé le :/g, '</span>Créé le : <span>')
								.replace(/<\/li>/g, '</span></li>');

							if (cleanHtml.indexOf('</ul>') !== -1) {
								cleanHtml = cleanHtml.replace('</ul>', '<li>Position : <span class="txt-p">' + px + ' x, ' + py + ' y</span></li></ul>');
							} else {
								cleanHtml = cleanHtml + '<br>Position : <span class="txt-p">' + px + ' x, ' + py + ' y</span>';
							}
							
							popup.setContent(cleanHtml);
							mapInstance.panTo(latlng, {animate: true, duration: 0.25});
						}
					});
				} else { activatePanAndTranslate(); }
			}, 1200);
		}
		loadNext(0);
	})();
</script>
</body>
</html>
