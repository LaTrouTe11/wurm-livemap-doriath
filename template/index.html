<!DOCTYPE html>
<html>
<head>
	<title>{{serverName}} - WU MapGen</title>
	<meta charset="utf-8"/>
	<meta name="viewport" content="initial-scale=1.0, user-scalable=no"/>
	<script>
		(function() {
			var styleLink = document.createElement('link');
			styleLink.rel = 'stylesheet';
			styleLink.crossOrigin = 'anonymous';
			var host = ['unpkg', 'com'].join('.');
			styleLink.href = 'https://' + host + '/leaflet@1.2.0/dist/leaflet.css';
			document.head.appendChild(styleLink);
		})();
	</script>
	<link rel="stylesheet" href="https://googleapis.com">
	<link rel="stylesheet" href="dist/Leaflet.Coordinates-0.1.5.css">
	<link rel="stylesheet" href="css/style.css">
</head>
<body data-realtime="{{enableRealtimeMarkers}}">

<div id="gui" :class="{sidebar: sidebarVisible}">
	<a id="sidebar-toggle" class="absolute transition z-gui" @click="sidebarVisible = !sidebarVisible">≡</a>
	<div id="sidebar" class="absolute transition z-gui" :class="{loaded: loaded}">
		<div class="block padding">
			<h1 style="color: #ffcc00; text-shadow: 0px 2px 4px rgba(0,0,0,0.8); font-size: 18px; text-align: center; margin-bottom: 8px; line-height: 1.3;">{{serverName}}</h1>
			<div style="text-align: center; margin-bottom: 14px;">
				<a href="https://wurm-unlimited.com" target="_blank" rel="noreferrer noopener" style="text-decoration: none;">
					<div style="background: #1a1a1a; border: 2px solid #00ccff; padding: 8px 16px; border-radius: 6px; font-family: sans-serif; font-size: 12px; font-weight: bold; color: #00ccff; box-shadow: 0 0 8px rgba(0,204,255,0.3); text-shadow: 1px 1px 2px #000;">
						🟢 SERVEUR : ONLINE
					</div>
				</a>
			</div>
			<div style="background: rgba(0, 0, 0, 0.5); border: 2px solid #00ffb7; padding: 8px; border-radius: 6px; font-size: 11px; color: #00ffb7; font-weight: bold; text-align: center;">
				Dernière compilation réussie<br>
				<span id="live-sync-date" style="color:#fff; font-size:12px;">2026-06-27 a 02:45:00</span>
			</div>
		</div>

		{{#showDeeds}}
		<div class="block">
			<label for="option-show-villages" class="flex"><input type="checkbox" id="option-show-villages" v-model="showVillages"> <span>Show deeds</span></label>
			<label for="option-show-village-borders" class="flex" :class="{inactive:!showVillages}"><input type="checkbox" id="option-show-village-borders" v-model="showVillageBorders"> <span>Show deed borders</span></label>
		</div>
		{{/showDeeds}}
		{{#showGuardTowers}}
		<div class="block">
			<label for="option-show-towers" class="flex"><input type="checkbox" id="option-show-towers" v-model="showTowers"> Show guard towers</label>
			<label for="option-show-tower-borders" class="flex" :class="{inactive:!showTowers}"><input type="checkbox" id="option-show-tower-borders" v-model="showTowerBorders"> <span>Show guard tower borders</span></label>
		</div>
		{{/showGuardTowers}}

		<div class="block attribution">
			<p><a href="https://github.com" target="_blank">WurmMapGen</a> powered by <a href="http://leafletjs.com" target="_blank">Leaflet</a></p>
		</div>
	</div>
	<div id="map" class="absolute transition z-page"></div>
</div>

<script crossorigin="anonymous">
	(function() {
		var unpkgHost = ['unpkg', 'com'].join('.');
		var jsdHost = ['cdn', 'jsdelivr', 'net'].join('.');
		var cdnjsHost = ['cdnjs', 'cloudflare', 'com'].join('.');
		
		var urls = [
			'https://' + unpkgHost + '/leaflet@1.2.0/dist/leaflet.js',
			'dist/Leaflet.Coordinates-0.1.5.min.js',
			'https://' + jsdHost + '/npm/cookies-js@1.2.3/dist/cookies.min.js',
			'https://' + cdnjsHost + '/ajax/libs/fetch/2.0.4/fetch.min.js',
			'https://' + cdnjsHost + '/ajax/libs/es6-promise/4.2.8/es6-promise.auto.min.js',
			'https://' + cdnjsHost + '/ajax/libs/vue/2.5.9/vue.min.js'
		];
		
		function loadNext(idx) {
			if (idx >= urls.length) { startApp(); return; }
			var s = document.createElement('script');
			s.src = urls[idx]; s.crossOrigin = 'anonymous'; s.onload = function() { loadNext(idx + 1); };
			document.body.appendChild(s);
		}
		
		function startApp() {
			window.WurmMapGen = {};
			var mods = ['app/util.js', 'app/markers.js', 'app/map.js', 'app/gui.js', 'app/main.js'];
			mods.forEach(function(src) {
				var s = document.createElement('script'); s.src = src; s.defer = true; document.body.appendChild(s);
			});
			activateBulleEngine();
		}

		// EXTRACTEUR SÉCURISÉ PAR BALISES DOM DIRECTES (PAS DE RETOUR BLANC POSSIBLE)
		function activateBulleEngine() {
			setTimeout(function() {
				if (window.WurmMapGen && WurmMapGen.map && WurmMapGen.map.map) {
					var mapInstance = WurmMapGen.map.map;
					
					mapInstance.on('popupopen', function(e) {
						var popup = e.popup;
						var contentHTML = popup.getContent();
						
						// Bloqueur anti-doublon pour figer le calcul de position
						if (contentHTML && contentHTML.indexOf('txt-p') !== -1) { return; }
						
						if (contentHTML && (contentHTML.indexOf('Mayor:') !== -1 || contentHTML.indexOf('Maire :') !== -1 || contentHTML.indexOf('Citizens:') !== -1)) {
							var tempDiv = document.createElement('div');
							tempDiv.innerHTML = contentHTML;
							
							// 1. Extraction du Titre et du Slogan
							var titleEl = tempDiv.querySelector('b');
							var villageName = titleEl ? titleEl.innerText.trim() : "Colonie";
							
							var mottoEl = tempDiv.querySelector('i');
							var mottoText = mottoEl ? mottoEl.innerText.trim() : "";
							
							// 2. Extraction du Maire et des Citoyens en lisant directement les balises HTML d'origine
							var mayorName = "Inconnu";
							var citizensCount = "1";
							
							var listItems = tempDiv.getElementsByTagName('li');
							if (listItems && listItems.length > 0) {
								for (var i = 0; i < listItems.length; i++) {
									var txt = listItems[i].innerText || listItems[i].textContent;
									if (txt.indexOf('Mayor:') !== -1) mayorName = txt.replace('Mayor:', '').trim();
									if (txt.indexOf('Maire :') !== -1) mayorName = txt.replace('Maire :', '').trim();
									if (txt.indexOf('Citizens:') !== -1) citizensCount = txt.replace('Citizens:', '').trim();
									if (txt.indexOf('Citoyens :') !== -1) citizensCount = txt.replace('Citoyens :', '').trim();
								}
							} else {
								// Secours textuel brut si le serveur n'a pas fait de liste li
								var rawText = tempDiv.innerText || tempDiv.textContent;
								var lines = rawText.split(/[\n\r]+/);
								for (var j = 0; j < lines.length; j++) {
									var line = lines[j].trim();
									if (line.indexOf('Mayor:') !== -1) mayorName = line.replace('Mayor:', '').trim();
									if (line.indexOf('Citizens:') !== -1) citizensCount = line.replace('Citizens:', '').trim();
								}
							}
							
							// 3. Calcul géospatiel de la position X/Y réelle au clic
							var latlng = popup.getLatLng();
							var px = Math.floor(latlng.lng);
							var py = Math.floor(-latlng.lat);
							
							// Reconstruction finale unifiée et blindée
							var newContent = [
								'<div align="center"><b style="color: #FFD700; font-size: 15px; text-shadow: 1px 1px 2px #000;">' + villageName + '</b><br>',
								(mottoText ? '<i style="color: #bbb; font-size: 11px;">' + mottoText + '</i>' : '') + '</div>',
								'<hr style="border:0; border-top:1px solid #ffcc00; margin:6px 0; opacity:0.3;">',
								'<div style="font-size: 12px; line-height: 1.5; color: #fff;">',
								'<b>Maire :</b> <span class="txt-m">' + mayorName + '</span><br>',
								'<b>Citoyens :</b> <span class="txt-c">' + citizensCount + '</span><br>',
								'<b>Créé le :</b> En 2026<br>',
								'<b>Position :</b> <span class="txt-p">' + px + ' x, ' + py + ' y</span>',
								'</div>'
							].join('');
							
							popup.setContent(newContent);
							popup.update();
						}
					});
				} else {
					activateBulleEngine();
				}
			}, 1200);
		}

		loadNext(0);
	})();
</script>
</body>
</html>
