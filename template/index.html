<!DOCTYPE html>
<html>
<head>
    <title>{{serverName}} - WU MapGen</title>
    <meta charset="utf-8"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.2.0/dist/leaflet.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body data-realtime="{{enableRealtimeMarkers}}">
<div id="gui">
    <div id="sidebar">
        <h1>{{serverName}}</h1>
        <p>Last update: <span id="live-sync-date">{{date_compil}}</span></p>
    </div>
    
    <div id="search">
        <input type="text" placeholder="Search..." v-model="searchQuery">
        <div id="search-results">
            <div v-for="result in searchResults" @click="clickResult(result)">
                <p><strong>{{{ result.name }}}</strong></p>
                <p class="small">{{{ result.text }}}</p>
            </div>
        </div>
    </div>
    <div id="map"></div>
</div>
<script src="https://unpkg.com/leaflet@1.2.0/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/vue/2.5.9/vue.min.js"></script>
<script>
    ['app/util.js', 'app/markers.js', 'app/map.js', 'app/gui.js', 'app/main.js'].forEach(function(src) { 
        var s = document.createElement('script'); s.src = src; s.defer = true; document.body.appendChild(s); 
    });
</script>
</body>
</html>
