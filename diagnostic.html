<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statut de Synchronisation - QBC Doriath</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #1a1a24; color: #fff; padding: 20px; margin: 0; }
        .container { max-width: 750px; margin: 40px auto; background: #222230; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); text-align: center; }
        h1 { color: #2196F3; margin-top: 0; font-size: 24px; }
        .status-card { background: #15151f; padding: 20px; border-radius: 6px; margin: 20px 0; border: 1px solid #333; display: flex; align-items: center; justify-content: center; gap: 15px; }
        .indicator { width: 18px; height: 18px; border-radius: 50%; display: inline-block; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        
        /* Couleurs des voyants système */
        .badge-green { background: #2e7d32; box-shadow: 0 0 12px #4caf50; }
        .badge-orange { background: #ef6c00; box-shadow: 0 0 12px #ff9800; animation: pulse 1.5s infinite; }
        .badge-red { background: #c62828; box-shadow: 0 0 12px #f44336; }
        
        .status-text { font-size: 18px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; }
        .time-info { color: #aaa; font-size: 14px; margin-top: 5px; font-family: monospace; }
        .btn-map { display: inline-block; background: #2196F3; color: white; padding: 12px 24px; text-decoration: none; border-radius: 4px; font-weight: bold; margin-top: 15px; transition: background 0.2s; }
        .btn-map:hover { background: #1976D2; }
        
        @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }
    </style>
</head>
<body>

<div class="container">
    <h1>Contrôleur de Déploiement GitHub Pages</h1>
    <p>Ce panneau vous indique si l'Action automatique a terminé d'envoyer les dernières tuiles de Doriath.</p>

    <div class="status-card">
        <div id="sync-indicator" class="indicator badge-orange"></div>
        <div id="sync-text" class="status-text">Analyse du dépôt...</div>
    </div>

    <div id="sync-time" class="time-info">Vérification de l'horloge système de Legion Hosting...</div>

    <a href="index.html" class="btn-map">🗺️ Ouvrir la Carte LiveMap</a>
</div>

<script>
    function checkGitHubStatus() {
        // On force la désactivation du cache du navigateur pour lire la vraie valeur en direct
        const antiCacheUrl = 'data/timestamp.json?t=' + new Date().getTime();

        fetch(antiCacheUrl)
            .then(res => {
                if (!res.ok) throw new Error("Fichier timestamp introuvable");
                return res.json();
            })
            .then(data => {
                // Récupération du timestamp généré par l'Action (en millisecondes)
                const buildTime = new Date(data.timestamp);
                const currentTime = new Date();
                
                // Calcul de la différence en minutes entre le build et maintenant
                const diffMinutes = Math.floor((currentTime - buildTime) / 1000 / 60);

                const ind = document.getElementById('sync-indicator');
                const txt = document.getElementById('sync-text');
                const timeInfo = document.getElementById('sync-time');

                // Formatage de la date proprement au format québécois/français
                const options = { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' };
                const formattedDate = buildTime.toLocaleDateString('fr-CA', options);

                if (diffMinutes <= 15) {
                    // SI LA MISE À JOUR A MOINS DE 15 MINUTES : Tout est prêt !
                    ind.className = "indicator badge-green";
                    txt.innerHTML = "Mise à jour réussie • Carte prête";
                    txt.style.color = "#81c784";
                    timeInfo.innerHTML = "Dernier envoi validé le : " + formattedDate + " (Il y a " + diffMinutes + " min)";
                } else if (diffMinutes > 15 && diffMinutes <= 370) {
                    // ENTRE DEUX BUILDS (Le script tourne toutes les 6 heures / 360 minutes)
                    ind.className = "indicator badge-green";
                    txt.innerHTML = "Données stables • En ligne";
                    txt.style.color = "#81c784";
                    timeInfo.innerHTML = "Carte synchronisée le : " + formattedDate + " (Prochaine synchro automatique planifiée)";
                } else {
                    // SI LE FICHIER A PLUS DE 6 HEURES : GitHub Actions est bloqué ou en retard
                    ind.className = "indicator badge-red";
                    txt.innerHTML = "Retard détecté • Synchro en attente";
                    txt.style.color = "#e57373";
                    timeInfo.innerHTML = "Dernière modification enregistrée le : " + formattedDate + "<br>⚠️ Vérifiez si l'Action GitHub n'est pas bloquée.";
                }
            })
            .catch(() => {
                // En cas d'erreur ou si le fichier timestamp n'a pas encore été créé par le premier build
                document.getElementById('sync-indicator').className = "indicator badge-orange";
                document.getElementById('sync-text').innerHTML = "Compilation en cours...";
                document.getElementById('sync-text').style.color = "#ffb74d";
                document.getElementById('sync-time').innerHTML = "GitHub Pages est en train de déployer les fichiers.<br>Patientez 30 secondes puis faites Ctrl + F5.";
            });
    }

    // Lancement immédiat de la vérification à l'ouverture de l'écran
    checkGitHubStatus();
    // Rafraîchissement automatique toutes les 15 secondes pour suivre le build en direct
    setInterval(checkGitHubStatus, 15000);
</script>

</body>
</html>
