<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Diagnostic Technique - LiveMap</title>
    <!-- Chargement de Leaflet indispensable pour que util.js et map.js ne plantent pas au démarrage -->
    <script src="https://unpkg.com"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a24; color: #fff; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: #222230; padding: 25px; border-radius: 8px; }
        h1 { color: #2196F3; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #333; }
        .status { font-weight: bold; padding: 4px 8px; border-radius: 4px; }
        .ok { background: #2e7d32; }
        .error { background: #c62828; }
        .warning { background: #ef6c00; }
        .console-box { background: #000; color: #0f0; padding: 15px; border-radius: 4px; max-height: 200px; overflow-y: auto; }
    </style>
</head>
<body>
<div class="container">
    <h1>Analyseur de Problèmes - QBC LiveMap</h1>
    <h2>1. Vérification des Fichiers Scripts (.js)</h2>
    <table>
        <thead><tr><th>Nom du Fichier</th><th>État</th><th>Détails</th></tr></thead>
        <tbody id="scripts-table">
            <tr><td>util.js</td><td id="s-util"><span class="status warning">Vérification...</span></td><td id="d-util">-</td></tr>
            <tr><td>map.js</td><td id="s-map"><span class="status warning">Vérification...</span></td><td id="d-map">-</td></tr>
        </tbody>
    </table>
    <h2>2. Vérification des Fichiers de Données (.json)</h2>
    <table id="json-table"><thead><tr><th>Fichier</th><th>État</th><th>Infos</th></tr></thead><tbody></tbody></table>
    <h2>3. Journal des Erreurs</h2>
    <div class="console-box" id="console-log">Aucune erreur...</div>
</div>
<script>
    // ... [Le script JS complet est disponible dans le document original] ...
    // Espace de nom global requis pour les tests
    window.WurmMapGen = window.WurmMapGen || {};
    window.WurmMapGen.config = { xyMulitiplier: 16, actualMapSize: 4096 };
    // ... (Logique de chargement des scripts/JSON identique à l'original) ...
</script>
</body>
</html>
