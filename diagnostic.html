<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Diagnostic LiveMap</title>
    <style>
        body { font-family: sans-serif; background: #1a1a24; color: #fff; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: #222230; padding: 20px; border-radius: 8px; }
        .status { font-weight: bold; padding: 4px; border-radius: 4px; }
        .ok { background: #2e7d32; } .error { background: #c62828; }
    </style>
</head>
<body>
<div class="container">
    <h1>Analyseur Ordre & Dépendances</h1>
    <!-- Structure simplifiée pour le diagnostic -->
    <p>Étape 1 (Leaflet): <span id="ord-leaflet" class="status">Analyse...</span></p>
    <p>Étape 2 (Vue): <span id="ord-vue" class="status">Analyse...</span></p>
    <p>Étape 3 (WurmMapGen): <span id="ord-wmg" class="status">Analyse...</span></p>
    <p>... (autres vérifications) ...</p>
    <p><b>Résultat:</b> <span id="global-order-status">Calcul...</span></p>
</div>
<script>
    // Script de diagnostic forcé (500ms)
    setTimeout(() => {
        const checks = ['L', 'Vue', 'WurmMapGen'];
        checks.forEach(lib => {
            const el = document.getElementById('ord-' + lib.toLowerCase());
            if (typeof window[lib] !== 'undefined') {
                el.innerHTML = '✔ OK'; el.className = 'status ok';
            } else {
                el.innerHTML = '✖ MANQUANT'; el.className = 'status error';
            }
        });
    }, 500);
</script>
</body>
</html>
