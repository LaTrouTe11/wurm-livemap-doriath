<!DOCTYPE html>
<html>
<head>
    <title>LABORATOIRE DE TEST - QBC</title>
    <link rel="stylesheet" href="https://unpkg.com" />
    <script src="https://unpkg.com"></script>
    <style>html, body, #test-map { width: 100%; height: 100%; margin: 0; padding: 0; background: #000; }</style>
</head>
<body>
    <div id="test-map"></div>
    <script>
        var map = L.map('test-map', { crs: L.CRS.Simple, minZoom: 0, maxZoom: 5 });
        var bounds = [[0, 0], [4096, 4096]];
        map.fitBounds(bounds);
        L.tileLayer('images/{x}-{y}.png', { tileSize: 256, noWrap: true, tms: true }).addTo(map);
        L.marker([2048, 2048]).addTo(map).bindPopup("<b>Centre de Doriath</b><br>Si ce message s'affiche, Leaflet fonctionne !").openPopup();
    </script>
</body>
</html>
