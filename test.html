<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test de Rendu d'Image - Doriath</title>
    <style>
        body { font-family: sans-serif; background: #1a1a24; color: white; padding: 20px; text-align: center; }
        .container { max-width: 800px; margin: 0 auto; background: #222230; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        h1 { color: #2196F3; }
        .grid-test { display: flex; gap: 20px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
        .card { background: #15151f; padding: 15px; border-radius: 6px; border: 1px solid #333; width: 300px; }
        .card h2 { font-size: 14px; margin-top: 0; color: #ffb74d; }
        img { width: 256px; height: 256px; border: 2px solid #444; background: #111; display: block; margin: 10px auto; image-rendering: pixelated; }
        .error-msg { color: #e57373; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Vérification du Serveur d'Images de Doriath</h1>
    <p>Cette page valide si les serveurs d'hébergement arrivent à lire vos tuiles PNG.</p>

    <div class="grid-test">
        <!-- TEST 1 : CHARGEMENT VIA GITHUB PAGES -->
        <div class="card">
            <h2>Hébergement : GitHub Pages</h2>
            <img src="images/9-8.png" alt="Tuile 9-8 manquante sur GitHub" onerror="this.style.display='none'; document.getElementById('err-gh').innerHTML='❌ ERREUR 404 : GitHub ne trouve pas l\'image.';">
            <div id="err-gh" class="error-msg"></div>
        </div>

        <!-- TEST 2 : CHARGEMENT VIA VERCEL -->
        <div class="card">
            <h2>Hébergement : Vercel Brut</h2>
            <img src="https://vercel.app" alt="Tuile 9-8 manquante sur Vercel" onerror="this.style.display='none'; document.getElementById('err-vc').innerHTML='❌ ERREUR 404 : Vercel ne trouve pas l\'image.';">
            <div id="err-vc" class="error-msg"></div>
        </div>
    </div>
</div>

<script>
    console.log("Vérification des chemins d'accès lancée.");
</script>

</body>
</html>
