name: Synchro Carte Wurm Legion Hosting (WurmMapGen v2.33)

on:
  schedule:
    - cron: '0 4 * * *' # Planification : Toutes les nuits a minuit au Quebec (4h00 UTC)
  workflow_dispatch: # Manuel : Bouton gris pour tester

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: 1. Connexion au depot GitHub
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    - name: 2. Installation de Java et lftp
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Installer lftp
      run: |
        sudo apt-get update && sudo apt-get install -y lftp
        mkdir -p ~/.lftp && echo "set sftp:auto-confirm yes; set ssl:verify-certificate false;" > ~/.lftp/rc

    - name: 3. Telechargement des bases de donnees Wurm
      run: |
        mkdir -p ./sqlite_db
        mkdir -p ./sqlite_db/sqlite
        lftp -u "${{ secrets.LEGION_USER }},${{ secrets.LEGION_PASS }}" sftp://${{ secrets.LEGION_HOST }}:${{ secrets.LEGION_PORT }} -e "
          get /dist/Doriath-4k-20/sqlite/wurmzones.db -o ./sqlite_db/sqlite/wurmzones.db;
          get /dist/Doriath-4k-20/sqlite/wurmeconomy.db -o ./sqlite_db/sqlite/wurmeconomy.db;
          get /dist/Doriath-4k-20/sqlite/wurmitems.db -o ./sqlite_db/sqlite/wurmitems.db;
          get /dist/Doriath-4k-20/sqlite/wurmplayers.db -o ./sqlite_db/sqlite/wurmplayers.db;
          get /dist/Doriath-4k-20/top_layer.map -o ./sqlite_db/top_layer.map;
          bye
        " || echo "⚠️ Fin du téléchargement FTP."

    - name: 3.5 Miroir de securite absolue pour la topographie 4K
      run: |
        cp ./sqlite_db/top_layer.map ./top_layer.map 2>/dev/null || true
        cp ./sqlite_db/top_layer.map ./sqlite_db/sqlite/top_layer.map 2>/dev/null || true

    - name: 3.9 Purge absolue de l'ancien cache index de racine
      run: |
        rm -f index.html || true

    - name: 4. Execution de WurmMapGen v2.33
      run: |
        java -Djava.awt.headless=true -Xmx3g -jar WurmMapGen.jar

    - name: 5. Configuration Automatique et Modification Forcee de app/map.js
      run: |
        rm -f ./config.json || true
        mkdir -p ./data
        echo '{"config":{"actualMapSize":4096,"showStructures":true,"nativeZoom":4,"mapMinZoom":2,"showGuardTowers":true,"mapMaxZoom":7,"mapTileSize":256,"showDeeds":true,"maxMapSize":32768,"markerType":2}}' > ./data/config.json
        if [ -f "./data/deeds.json" ]; then
          cp ./data/deeds.json ./data/villages.json 2>/dev/null || true
        fi
        if [ -f "./data/towers.json" ]; then
          cp ./data/towers.json ./data/guardtowers.json 2>/dev/null || true
        fi
        
        # 1. Regroupement de la mention 4k sur le titre de l'index
        sed -i 's|4k|<span style="white-space: nowrap;">4k</span>|g' index.html
        
        # 2. Injection de la date de compilation Quebecoise
        DATE_COMPIL=$(TZ="America/Toronto" date +'%Y-%m-%d a %H:%M:%S')
        sed -i "s|2026-06-26 a 22:32:10|$DATE_COMPIL|g" index.html

        # 3. INJECTION AUTOMATIQUE DIRECTE DANS LE FICHIER GENERÉ APP/MAP.JS (COULEURS ET OPTIONS)
        # Remplace le bloc bindPopup standard par votre version Or, Emeraude et recentrage fluide
        sed -i 's|marker.bindPopup(\[\s*'\''<div align="center"><b>'\'' + escapeHtml(village.name) + '\''<\/b>'\''\s*,\s*'\''<i>'\'' + escapeHtml(village.motto) + '\''<\/i><\/div>'\''\s*,\s*'\''<b>Mayor:<\/b> '\'' + escapeHtml(village.mayor)\s*,\s*'\''<b>Citizens:<\/b> '\'' + escapeHtml(village.citizens)\s*\].join('\''<br>'\''));|marker.bindPopup('\''<div align=\"center\"><b style=\"color: #FFD700; font-size: 15px; text-shadow: 1px 2px 3px #000; font-family: Roboto, sans-serif; letter-spacing: 0.5px;\">'\'' + escapeHtml(village.name) + '\''<\/b><br>'\'' + (village.motto ? '\''<i style=\"color: #bbb; font-size: 11px;\">'\'' + escapeHtml(village.motto) + '\''<\/i>'\'' : '\'''\'') + '\''<\/div><div style=\"margin-top: 8px; font-size: 11px; line-height: 1.4; color: #fff;\"><b>Maire :<\/b> <span style=\"color: #00FF7F; font-weight: bold;\">'\'' + (village.mayor ? escapeHtml(village.mayor) : '\''Inconnu'\'') + '\''<\/span><br><b>Citoyens :<\/b> <span style=\"color: #00FFFF; font-weight: bold;\">'\'' + (village.citizens ? escapeHtml(village.citizens) : '\''1'\'') + '\''<\/span><br><b>Créé le :<\/b> '\'' + (village.creation ? escapeHtml(village.creation) + '\'' 2026'\'' : '\''En 2026'\'') + '\''<br><b>Position :<\/b> <span style=\"font-family: monospace;\">'\'' + Math.floor(village.x) + '\'' x, '\'' + Math.floor(village.y) + '\'' y<\/span><\/div>'\'', {keepInView: true, autoPan: true, offset: L.point(0, -25), autoPanPaddingTopLeft: L.point(50, 320), autoPanPaddingBottomRight: L.point(50, 50)});|g' app/map.js

    - name: 6. Sauvegarde et Envoi automatique force
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@://github.com"
        git pull origin main --rebase || true
        git add data/*.json || true
        git add *.json || true
        git add index.html || true
        git add app/*.js || true
        git add images/ || true
        git add tiles/ || true
        git commit --allow-empty -m "Mise a jour de la carte en direct avec injection de style"
        git push origin main --force

    - name: 7. Televersement natif vers GitHub Pages
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.'
        retention-days: 7

    - name: 8. Deploiement Final au Vert
      uses: actions/deploy-pages@v4


