name: Synchro Carte Wurm Legion Hosting

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout du depot
        uses: actions/checkout@v4

      - name: 2. Installation dependances
        run: sudo apt-get update && sudo apt-get install -y lftp openjdk-17-jre

      - name: 3. Telechargement (Mode securise)
        run: |
          # 1. On télécharge tout à la racine du runner
          lftp -c "set sftp:auto-confirm yes; set ssl:verify-certificate no; \
          open sftp://${{ secrets.LEGION_USER }}:${{ secrets.LEGION_PASS }}@${{ secrets.LEGION_HOST }}:${{ secrets.LEGION_PORT }}; \
          cd /dist/Doriath-4k-20/sqlite/; \
          mget wurmzones.db wurmitems.db wurmplayers.db; \
          cd ../; \
          get top_layer.map; \
          bye"
          
          # 2. On crée le dossier sqlite attendu et on y déplace les bases
          mkdir -p ./sqlite
          mv wurmzones.db wurmitems.db wurmplayers.db ./sqlite/

      - name: 4. Execution WurmMapGen
        run: |
          # Le logiciel trouvera les DB dans ./sqlite/ et la map à la racine
          java -Djava.awt.headless=true -Xmx3g -jar WurmMapGen.jar
          sed -i "s|{{date_compil}}|$(date +'%Y-%m-%d %H:%M:%S')|g" index.html

      - name: 5. Generation du rapport
        run: |
          echo "Rapport de generation - QBC Doriath 4K" > generation_report.txt
          echo "Date : $(date +'%Y-%m-%d %H:%M:%S')" >> generation_report.txt
          ls -lh ./sqlite/*.db top_layer.map >> generation_report.txt

      - name: 6. Envoi au depot
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Synchronisation forcée pour éviter les erreurs de verrouillage
          git fetch origin main
          git reset --hard origin/main
          
          git add index.html generation_report.txt data/ images/ || true
          
          if ! git diff --cached --quiet; then
            git commit -m "MAJ auto carte et rapport"
            git push origin main
          else
            echo "Aucun changement a envoyer."
          fi
