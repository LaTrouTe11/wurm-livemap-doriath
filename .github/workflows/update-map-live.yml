name: Synchro Carte Wurm Legion Hosting

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4

      - name: 2. Installation
        run: sudo apt-get update && sudo apt-get install -y lftp openjdk-17-jre

      - name: 3. Telechargement des donnees
        run: |
          mkdir -p ./sqlite
          lftp -u ${{ secrets.LEGION_USER }},${{ secrets.LEGION_PASS }} sftp://${{ secrets.LEGION_HOST }}:${{ secrets.LEGION_PORT }} <<EOF
          set sftp:auto-confirm yes
          set ssl:verify-certificate no
          set xfer:clobber on
          set sftp:connect-program "ssh -a -x -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
          cd /dist/Doriath-4k-20/sqlite/
          mget -O ./sqlite/ wurmzones.db wurmitems.db wurmplayers.db
          cd ../
          get -O . top_layer.map
          bye
          EOF

      - name: 4. Execution et Conversion
        run: |
          mkdir -p data
          echo '{"actualMapSize":4096,"mapTileSize":256,"mapMaxZoom":5,"mapMinZoom":0,"nativeZoom":5,"markerType":2}' > data/config.json
          java -Djava.awt.headless=true -Xmx6g -jar WurmMapGen.jar || true
          rm -f data/*.php

      - name: 4c. Synchronisation Totale (Racine vers Template)
        run: |
          # Nettoyage complet du dossier template
          rm -rf template/*
          mkdir -p template/app template/data
          
          # Copie forcée de TOUT le contenu
          cp index.html template/index.html
          cp data/*.json template/data/ || true
          cp app/*.js template/app/ || true
          cp -r css/ template/css/ || true
          cp -r images/ template/images/ || true

      - name: 5. Synchronisation Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "MAJ finale : synchronisation racine vers template"
            git push origin main
          fi
