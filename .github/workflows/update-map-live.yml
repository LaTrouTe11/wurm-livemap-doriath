name: Synchro Carte Wurm Legion Hosting

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */6 * * *' # S'exécute automatiquement toutes les 6 heures
  workflow_dispatch:

# Autorise le workflow à modifier le site GitHub Pages lié
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4

      - name: 2. Installation
        run: sudo apt-get update && sudo apt-get install -y lftp openjdk-17-jre

      - name: 3. Telechargement des donnees
        run: |
          mkdir -p ./sqlite
          lftp -u ${{ secrets.LEGION_USER }},${{ secrets.LEGION_PASS }} sftp://${{ secrets.LEGION_HOST }}:${{ secrets.LEGION_PORT }} <<EOF
          set sftp:auto-confirm yes
          set ssl:verify-certificate no
          set xfer:clobber on
          set sftp:connect-program "ssh -a -x -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
          cd /dist/Doriath-4k-20/sqlite/
          mget -O ./sqlite/ wurmzones.db wurmitems.db wurmplayers.db
          cd ../
          get -O . top_layer.map
          bye
          EOF

      - name: 4. Execution du Generateur Wurm
        run: |
          # Exécution de WurmMapGen avec une allocation de mémoire adaptée aux limites de GitHub
          java -Djava.awt.headless=true -Xmx5g -jar WurmMapGen.jar
          
          # Nettoyage strict des scripts serveurs dans le dossier data
          if [ -d "data" ]; then
            find data/ -type f ! -name "*.json" -delete
            rm -f data/*.php
          fi
          
          # Suppression immédiate des fichiers sources lourds pour libérer l'espace disque de la VM
          rm -rf sqlite/
          rm -f top_layer.map

      - name: 5. Televersement de l'artéfact Web
        uses: actions/upload-pages-artifact@v3
        with:
          # Téléverse directement tout le répertoire racine vers l'hébergement web sans polluer l'historique Git
          path: '.'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps:deployment.outputs.page_url }}
    steps:
      - name: 6. Déploiement vers GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

