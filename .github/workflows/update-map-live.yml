name: Synchro Carte Wurm Legion Hosting

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4

      - name: 2. Installation
        run: sudo apt-get update && sudo apt-get install -y lftp openjdk-17-jre

      - name: 3. Telechargement des donnees
        run: |
          mkdir -p ./sqlite
          # Correction : Ajout de sftp:connect-program pour ignorer la vérification de clé hôte
          lftp -u ${{ secrets.LEGION_USER }},${{ secrets.LEGION_PASS }} sftp://${{ secrets.LEGION_HOST }}:${{ secrets.LEGION_PORT }} <<EOF
          set sftp:auto-confirm yes
          set ssl:verify-certificate no
          set sftp:connect-program "ssh -a -x -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
          cd /dist/Doriath-4k-20/sqlite/
          mget wurmzones.db wurmitems.db wurmplayers.db
          cd ../
          get top_layer.map
          bye
          EOF
          mv wurmzones.db wurmitems.db wurmplayers.db ./sqlite/

      - name: 4. Execution et Conversion
        run: |
          # Création forcée du config.json
          mkdir -p data
          echo '{"actualMapSize":4096,"mapTileSize":256,"mapMaxZoom":5,"mapMinZoom":0,"nativeZoom":5,"markerType":2}' > data/config.json
          
          # Lancement du générateur
          java -Djava.awt.headless=true -Xmx6g -jar WurmMapGen.jar || true
          
          # Nettoyage radical : on supprime tout ce qui n'est pas .json
          rm -f data/*.php

      - name: 4c. Synchronisation Totale
        run: |
          mkdir -p template/data
          mkdir -p template/app
          cp data/*.json template/data/ || true
          [ -f app/main.js ] && cp app/main.js template/app/main.js || true

      - name: 5. Synchronisation Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "MAJ finale : correction connexion SFTP et nettoyage JSON"
            git push origin main
          fi
