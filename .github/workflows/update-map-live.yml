name: Synchro Carte Wurm Legion Hosting

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4

      - name: 2. Installation
        run: sudo apt-get update && sudo apt-get install -y lftp openjdk-17-jre

      - name: 3. Telechargement des donnees
        run: |
          mkdir -p ./sqlite
          lftp -u ${{ secrets.LEGION_USER }},${{ secrets.LEGION_PASS }} sftp://${{ secrets.LEGION_HOST }}:${{ secrets.LEGION_PORT }} <<EOF
          set sftp:auto-confirm yes
          set ssl:verify-certificate no
          cd /dist/Doriath-4k-20/sqlite/
          mget wurmzones.db wurmitems.db wurmplayers.db
          cd ../
          get top_layer.map
          bye
          EOF
          mv wurmzones.db wurmitems.db wurmplayers.db ./sqlite/

      - name: 4. Execution et Conversion
        run: |
          # Creation forcée du fichier properties complet pour le robot
          cat <<EOF > WurmMapGen.properties
          serverName=[QC/FR/CAN] QBC Doriath |PVE | MODS 8 K 2025
          wurmMapLocation=.
          saveLocation=.
          dbDir=./sqlite/
          zonesDb=wurmzones.db
          itemsDb=wurmitems.db
          playersDb=wurmplayers.db
          enableRealtimeMarkers=false
          rmiHost=localhost
          rmiPort=8080
          markerType=2
          mapTileSize=256
          actualMapSize=4096
          mapMaxZoom=5
          mapGenerateShading=true
          mapShadingModifier=1.0
          mapShadePaths=true
          mapGenerateWater=true
          mapGenerateBridges=true
          showPlayers=false
          showDeeds=true
          showGuardTowers=true
          showStructures=true
          showPortals=true
          EOF

          # Lancement avec 6Go de RAM
          java -Djava.awt.headless=true -Xmx6g -jar WurmMapGen.jar
          
          # Nettoyage et conversion .php -> .json
          rm -f config.php
          for f in data/*.php; do [ -e "\$f" ] && mv "\$f" "\${f%.php}.json"; done
          sed -i "s|MAJ_DATE_ICI|$(date +'%Y-%m-%d %H:%M:%S')|g" index.html

      - name: 5. Synchronisation Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git reset --hard origin/main
          git add index.html data/ images/ || true
          if ! git diff --cached --quiet; then
            git commit -m "MAJ auto : carte JSON"
            git push origin main
          fi
