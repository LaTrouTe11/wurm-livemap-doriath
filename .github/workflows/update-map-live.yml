name: Synchro Carte Wurm Legion Hosting

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Installation
        run: sudo apt-get update && sudo apt-get install -y lftp openjdk-17-jre

      - name: Telechargement et Generation
        run: |
          mkdir -p ./sqlite
          lftp -u ${{ secrets.LEGION_USER }},${{ secrets.LEGION_PASS }} sftp://${{ secrets.LEGION_HOST }}:${{ secrets.LEGION_PORT }} -e "cd /dist/Doriath-4k-20/sqlite/; mget wurmzones.db wurmitems.db wurmplayers.db; bye"
          mv wurmzones.db wurmitems.db wurmplayers.db ./sqlite/
          
          echo '{"actualMapSize":4096,"mapTileSize":256,"mapMaxZoom":5,"mapMinZoom":0,"nativeZoom":5,"markerType":2}' > data/config.json
          
          java -Djava.awt.headless=true -Xmx6g -jar WurmMapGen.jar || true
          
          # NETTOYAGE RADICAL : On vire tous les PHP générés
          rm -f data/*.php

      - name: Synchronisation Totale
        run: |
          mkdir -p template/data
          cp data/*.json template/data/ || true
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "MAJ finale : nettoyage PHP et synchro JSON"
            git push origin main
          fi
