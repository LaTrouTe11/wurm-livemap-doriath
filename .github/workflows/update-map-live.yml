name: Synchro Carte Wurm Legion Hosting

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout du code source
        uses: actions/checkout@v4

      - name: 2. Installation des paquets requis
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp openjdk-17-jre

      - name: 3. Telechargement des donnees serveurs (.db et .map)
        run: |
          mkdir -p ./sqlite
          lftp -u "${{ secrets.LEGION_USER }},${{ secrets.LEGION_PASS }}" sftp://${{ secrets.LEGION_HOST }}:${{ secrets.LEGION_PORT }} <<EOF
          set sftp:auto-confirm yes
          set ssl:verify-certificate no
          set xfer:clobber on
          set sftp:connect-program "ssh -a -x -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
          cd /dist/Doriath-4k-20/sqlite/
          mget -O ./sqlite/ wurmzones.db wurmitems.db wurmplayers.db
          cd ../
          get -O . top_layer.map
          bye
          EOF

      - name: 4. Execution du Generateur et Correction Automatique
        run: |
          # 1. Sauvegarde et mise à l'abri de votre code racine
          mkdir -p /tmp/wurm_web_save
          cp index.html /tmp/wurm_web_save/index.html 2>/dev/null || true
          
          # 2. Arborescence obligatoire exigée par l'outil Java
          mkdir -p template/app template/css template/data template/images template/markers template/dist template/includes
          cp /tmp/wurm_web_save/index.html template/index.html 2>/dev/null || true
          
          # 3. Nettoyage de la configuration RMI pour bloquer les doublons
          if [ -f "WurmMapGen.properties" ]; then
            sed -i '/rmiPassword/d' WurmMapGen.properties
            sed -i 's/rmiHost=.*/rmiHost=${{ secrets.LEGION_HOST }}/g' WurmMapGen.properties
            sed -i 's/rmiPort=.*/rmiPort=5606/g' WurmMapGen.properties
            sed -i 's/enableRealtimeMarkers=.*/enableRealtimeMarkers=true/g' WurmMapGen.properties
            echo "rmiPassword=${{ secrets.RMI_PASSEWORD }}" >> WurmMapGen.properties
          fi

          # 4. Exécution de l'outil Java
          java -Djava.awt.headless=true -Xmx5g -jar WurmMapGen.jar
          
          # 5. Restauration de sécurité du fichier racine
          cp -f /tmp/wurm_web_save/index.html ./index.html 2>/dev/null || true
          
          # 6. CORRECTION TECHNIQUE AUTOMATIQUE : Répare de force les adresses unpkg incomplètes
          if [ -f "index.html" ]; then
            sed -i 's|href="https://unpkg.com"|href="https://unpkg.com"|g' index.html
            sed -i 's|src="https://unpkg.com"|src="https://unpkg.com"|g' index.html
          fi

          # 7. Nettoyage des dossiers temporaires
          rm -rf sqlite/ top_layer.map template/ app/ dist/ includes/ /tmp/wurm_web_save/
          if [ -d "data" ]; then find data/ -type f ! -name "*.json" -delete; fi

      - name: 5. Sauvegarde Persistante et Envoi Visible sur GitHub
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add images/ data/ index.html WurmMapGen.properties
          # Le robot pousse lui-même la correction des liens sur votre dépôt GitHub visible
          git diff-index --quiet HEAD || git commit -m "MAJ auto : reparation automatique des liens CDN unpkg"
          git push origin main || true

      - name: 6. Creation et televersement de l'artefact Web
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 7. Deploiement en ligne sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4




