- name: 4. Execution et Conversion
        run: |
          # 1. Création propre du fichier de configuration
          cat <<EOF > WurmMapGen.properties
          serverName=[QC/FR/CAN] QBC Doriath
          wurmMapLocation=.
          saveLocation=.
          dbDir=./sqlite/
          zonesDb=wurmzones.db
          itemsDb=wurmitems.db
          playersDb=wurmplayers.db
          enableRealtimeMarkers=false
          rmiHost=localhost
          rmiPort=8080
          markerType=2
          mapTileSize=256
          actualMapSize=4096
          mapMaxZoom=5
          EOF

          # 2. Lancement avec paramètres système forcés (évite le NullPointerException)
          # On ajoute un "|| true" à la fin pour que même s'il y a une erreur mineure 
          # sur la génération PHP, GitHub continue et publie les images.
          java -Djava.awt.headless=true -Xmx6g \
          -DrmiHost="localhost" -DrmiPort="8080" \
          -jar WurmMapGen.jar || true
          
          # 3. Conversion et nettoyage forcé
          # On déplace les .php vers .json
          for f in data/*.php; do [ -e "$f" ] && mv "$f" "${f%.php}.json"; done
          # On supprime tout ce qui est .php pour garder le dépôt propre
          rm -f data/*.php
          rm -f config.php
          
          # 4. Mise à jour de la date
          sed -i "s|MAJ_DATE_ICI|$(date +'%Y-%m-%d %H:%M:%S')|g" index.html
