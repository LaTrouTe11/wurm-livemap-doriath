
name: Synchro Carte Wurm Legion Hosting (WurmMapGen v2.33)

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: 1. Connexion au depot GitHub
      uses: actions/checkout@v4
      with:
        persist-credentials: true
        fetch-depth: 0

    - name: 2. Installation de Java et lftp
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Installer lftp
      run: |
        sudo apt-get update && sudo apt-get install -y lftp
        mkdir -p ~/.lftp && echo "set sftp:auto-confirm yes; set ssl:verify-certificate false;" > ~/.lftp/rc

    - name: 3. Telechargement des bases de donnees Wurm
      run: |
        mkdir -p ./sqlite_db
        mkdir -p ./sqlite_db/sqlite
        lftp -u "${{ secrets.LEGION_USER }},${{ secrets.LEGION_PASS }}" sftp://${{ secrets.LEGION_HOST }}:${{ secrets.LEGION_PORT }} -e "
          get /dist/Doriath-4k-20/sqlite/wurmzones.db -o ./sqlite_db/sqlite/wurmzones.db;
          get /dist/Doriath-4k-20/sqlite/wurmeconomy.db -o ./sqlite_db/sqlite/wurmeconomy.db;
          get /dist/Doriath-4k-20/sqlite/wurmitems.db -o ./sqlite_db/sqlite/wurmitems.db;
          get /dist/Doriath-4k-20/sqlite/wurmplayers.db -o ./sqlite_db/sqlite/wurmplayers.db;
          get /dist/Doriath-4k-20/top_layer.map -o ./sqlite_db/top_layer.map;
          bye
        " || echo "⚠️ Fin du téléchargement FTP."

    - name: 3.5 Miroir de securite absolue pour la topographie 4K
      run: |
        cp ./sqlite_db/top_layer.map ./top_layer.map 2>/dev/null || true
        cp ./sqlite_db/top_layer.map ./sqlite_db/sqlite/top_layer.map 2>/dev/null || true

    - name: 3.9 Purge absolue de l'ancien cache index de racine
      run: |
        rm -f index.html || true

    - name: 4. Execution de WurmMapGen v2.33
      run: |
        java -Djava.awt.headless=true -Xmx3g -jar WurmMapGen.jar

    - name: 5. Force Overwrite Protection (Securisation Index d Usine)
      run: |
        rm -f ./config.json || true
        mkdir -p ./data
        echo '{"config":{"actualMapSize":4096,"showStructures":true,"nativeZoom":4,"mapMinZoom":2,"showGuardTowers":true,"mapMaxZoom":7,"mapTileSize":256,"showDeeds":true,"maxMapSize":32768,"markerType":2}}' > ./data/config.json
        if [ -f "./data/deeds.json" ]; then cp ./data/deeds.json ./data/villages.json 2>/dev/null || true; fi
        if [ -f "./data/towers.json" ]; then cp ./data/towers.json ./data/guardtowers.json 2>/dev/null || true; fi
        
        # BLINDAGE ABSOLU : On ecrase l index casse de Java par notre modele template parfait
        cp -f template/index.html index.html
        
        # RESTAURATION FORCEE DES SCRIPTS ORIGINAUX SANS ERREUR JS
        git checkout HEAD app/util.js app/markers.js app/map.js app/gui.js app/main.js 2>/dev/null || true
        rm -f app/live-interceptor.js || true
        
        # INJECTION SÉCURISÉE DE LA CORRECTION DATE 2026 DANS LE CODE SOURCE DE LA MAP
        if [ -f "app/map.js" ]; then
          sed -i "s|'<b>Mayor:</b> ' + escapeHtml(village.mayor),|'👑 <b>Mayor (Maire) :</b> <span class=\"txt-m\">' + escapeHtml(village.mayor) + '</span>',|g" app/map.js
          sed -i "s|'<b>Citizens:</b> ' + escapeHtml(village.citizens)|'👥 <b>Citizens (Citoyens) :</b> <span class=\"txt-c\">' + escapeHtml(village.citizens) + '</span><br>📅 <b>Founded (Créé) :</b> <span>2026</span><br>📍 <b>Coordinates (Position) :</b> <span class=\"txt-x\">X' + Math.floor(village.x) + '</span>, <span class=\"txt-y\">Y' + Math.floor(village.y) + '</span>'|g" app/map.js
          sed -i "s|tms: false|tms: false, errorTileUrl: 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII='|g" app/map.js
        fi

        # Remplacement dynamique du nom du serveur et de la date dans le fichier final
        sed -i 's|{{serverName}}|Doriath 4K|g' index.html
        sed -i 's|{{enableRealtimeMarkers}}|true|g' index.html
        sed -i 's|{{#showDeeds}}||g' index.html
        sed -i 's|{{/showDeeds}}||g' index.html
        sed -i 's|{{#showGuardTowers}}||g' index.html
        sed -i 's|{{/showGuardTowers}}||g' index.html
        
        DATE_COMPIL=$(TZ="America/Toronto" date +'%Y-%m-%d a %H:%M:%S')
        sed -i "s|2026-06-27 a 04:00:00|$DATE_COMPIL|g" index.html

    - name: 6. Sauvegarde et Envoi automatique force
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@://github.com"
        git pull origin main --rebase || true
        git add data/*.json || true
        git add *.json || true
        git add index.html || true
        git add app/*.js || true
        git add css/*.css || true
        git add images/ || true
        git add tiles/ || true
        git commit --allow-empty -m "Restauration d usine indestructible sans page blanche"
        git push origin main --force

    - name: 7. Televersement natif vers GitHub Pages
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.'
        retention-days: 7

    - name: 8. Deploiement Final au Vert
      uses: actions/deploy-pages@v4

