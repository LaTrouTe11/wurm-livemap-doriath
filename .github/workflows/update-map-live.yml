name: Synchro Carte Wurm Legion Hosting (WurmMapGen v2.33)

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: 1. Connexion au depot GitHub
      uses: actions/checkout@v4
      with:
        persist-credentials: true
        fetch-depth: 0

    - name: 2. Installation de Java et lftp
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Installer lftp
      run: |
        sudo apt-get update && sudo apt-get install -y lftp
        mkdir -p ~/.lftp && echo "set sftp:auto-confirm yes; set ssl:verify-certificate false;" > ~/.lftp/rc

    - name: 3. Telechargement des bases de donnees Wurm
      run: |
        mkdir -p ./sqlite_db
        mkdir -p ./sqlite_db/sqlite
        lftp -u "${{ secrets.LEGION_USER }},${{ secrets.LEGION_PASS }}" sftp://${{ secrets.LEGION_HOST }}:${{ secrets.LEGION_PORT }} -e "
          get /dist/Doriath-4k-20/sqlite/wurmzones.db -o ./sqlite_db/sqlite/wurmzones.db;
          get /dist/Doriath-4k-20/sqlite/wurmeconomy.db -o ./sqlite_db/sqlite/wurmeconomy.db;
          get /dist/Doriath-4k-20/sqlite/wurmitems.db -o ./sqlite_db/sqlite/wurmitems.db;
          get /dist/Doriath-4k-20/sqlite/wurmplayers.db -o ./sqlite_db/sqlite/wurmplayers.db;
          get /dist/Doriath-4k-20/top_layer.map -o ./sqlite_db/top_layer.map;
          bye
        " || echo "⚠️ Fin du téléchargement FTP."

    - name: 3.5 Miroir de securite absolue pour la topographie 4K
      run: |
        cp ./sqlite_db/top_layer.map ./top_layer.map 2>/dev/null || true
        cp ./sqlite_db/top_layer.map ./sqlite_db/sqlite/top_layer.map 2>/dev/null || true

    - name: 3.9 Purge absolue de l'ancien cache index de racine
      run: |
        rm -f index.html || true

    - name: 4. Execution de WurmMapGen v2.33
      run: |
        java -Djava.awt.headless=true -Xmx3g -jar WurmMapGen.jar

    - name: 5. Injection de Stabilisation d'usine sans aucun bug JS
      run: |
        rm -f ./config.json || true
        mkdir -p ./data
        echo '{"config":{"actualMapSize":4096,"showStructures":true,"nativeZoom":4,"mapMinZoom":2,"showGuardTowers":true,"mapMaxZoom":7,"mapTileSize":256,"showDeeds":true,"maxMapSize":32768,"markerType":2}}' > ./data/config.json
        if [ -f "./data/deeds.json" ]; then cp ./data/deeds.json ./data/villages.json 2>/dev/null || true; fi
        if [ -f "./data/towers.json" ]; then cp ./data/towers.json ./data/guardtowers.json 2>/dev/null || true; fi
        
        # RESTAURATION DES SCRIPTS PURS SANS INTERCEPTEUR POUR TUER LA PAGE BLANCHE
        git checkout HEAD app/util.js app/markers.js app/map.js app/gui.js app/main.js 2>/dev/null || true
        rm -f app/live-interceptor.js || true
        
        # INJECTION DE L'HABILLAGE STRUCTUREL EXTERNE ET DES TRADUCTIONS DANS L'INDEX GENERE
        sed -i 's|<h1>{{serverName}}</h1>|<div style="padding:12px;text-align:center;background:#222;margin:-20px -15px 10px -15px;border-bottom:1px solid #444;"><h1 style="color:#ffcc00;font-size:18px;margin-bottom:8px;">{{serverName}}</h1><a href="https://wurm-unlimited.com" target="_blank" rel="noreferrer noopener"><img src="https://wurm-unlimited.combanners/half-banner-1.png" border="0" style="border-radius:4px;border:1px solid #ffcc00;width:100%;max-width:100%;height:auto;object-fit:contain;display:block;margin:0 auto;"></a></div><div style="padding:10px 15px;border-bottom:1px solid #444;"><strong style="color:#ffcc00;font-size:12px;display:block;margin-bottom:4px;">🌐 Links (Liens) :</strong><a href="https://wurm-unlimited.com" target="_blank" rel="noreferrer noopener" style="display:block;text-align:center;text-decoration:none;font-family:sans-serif;font-size:11px;font-weight:bold;padding:6px;margin:5px 0;border-radius:4px;background:#ffcc00;color:#111;border:1px solid #cca300;">🔗 SERVER WEB PAGE</a><a href="https://discord.gg" target="_blank" rel="noreferrer noopener" style="display:block;text-align:center;text-decoration:none;font-family:sans-serif;font-size:11px;font-weight:bold;padding:6px;margin:5px 0;border-radius:4px;background:#5865F2;color:#fff;border:1px solid #4752c4;">💬 JOIN DISCORD</a></div>|g' index.html
        sed -i 's|<p id="playercount">0 players online</p>||g' index.html
        sed -i 's|<span>Show deeds</span>|<span>Show deeds (Afficher les colonies)</span>|g' index.html
        sed -i 's|<span>Show deed borders</span>|<span>Show deed borders (Frontières)</span>|g' index.html
        sed -i 's|Show guard towers|Show guard towers (Tours de garde)|g' index.html
        sed -i 's|<span>Show guard tower borders</span>|<span>Show tower borders (Rayons d\x27action)</span>|g' index.html
        
        # FIX DE LA BULLE POPUP EN ANTHRACITE ET DU SILENCIEUX TRANSPARENT ANTI-404
        sed -i "s|tms: false|tms: false, errorTileUrl: 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII='|g" index.html
        
        # INJECTION DE LA DATE BILINGUE DE DERNIERE REUSSITE ET DU VISUEL ADOUCI
        DATE_COMPIL=$(TZ="America/Toronto" date +'%Y-%m-%d a %H:%M:%S')
        sed -i "s|WurmMapGen</a> powered by <a href=\"http://leafletjs.com\" target=\"_blank\">Leaflet</a></p>|WurmMapGen</a> powered by <a href=\"http://leafletjs.com\" target=\"_blank\">Leaflet</a></p><div style=\"background:rgba(0,0,0,0.4);border:1px solid #ffcc00;padding:6px;border-radius:4px;font-size:10px;color:#ffcc00;font-weight:bold;text-align:center;margin-top:10px;line-height:1.3;\">Last update / Dernière mise à jour :<br><span style=\"color:#fff;font-size:11px;font-family:monospace;\">$DATE_COMPIL</span></div>|g" index.html
        sed -i 's|</head>|<style>.leaflet-popup-content-wrapper{background:rgba(45,45,45,0.88)!important;border:2px solid #ffcc00!important;box-shadow:0px 4px 15px rgba(0,0,0,0.5)!important;border-radius:8px!important;width:250px!important;max-width:250px!important;padding:0!important;backdrop-filter:blur(6px);}.leaflet-popup-tip{background:rgba(45,45,45,0.88)!important;border:1px solid #ffcc00!important;}.leaflet-popup-content{color:#fff!important;font-family:sans-serif!important;font-size:12px!important;line-height:1.6!important;margin:12px!important;width:auto!important;}.leaflet-popup-content b,.leaflet-popup-content strong{color:#FFD700!important;text-shadow:1px 1px 2px rgba(0,0,0,0.8)!important;}</style></head>|g' index.html

    - name: 6. Sauvegarde et Envoi automatique force
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@://github.com"
        git pull origin main --rebase || true
        git add data/*.json || true
        git add *.json || true
        git add index.html || true
        git add app/*.js || true
        git add css/*.css || true
        git add images/ || true
        git add tiles/ || true
        git commit --allow-empty -m "Mise a jour d usine stable sans bug"
        git push origin main --force

    - name: 7. Televersement natif vers GitHub Pages
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.'
        retention-days: 7

    - name: 8. Deploiement Final au Vert
      uses: actions/deploy-pages@v4


