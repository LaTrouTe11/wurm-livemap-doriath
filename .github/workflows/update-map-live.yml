name: Synchro Carte Wurm Legion Hosting

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4

      - name: 2. Installation
        run: sudo apt-get update && sudo apt-get install -y lftp openjdk-17-jre

      - name: 3. Telechargement des donnees
        run: |
          mkdir -p ./sqlite
          lftp -u ${{ secrets.LEGION_USER }},${{ secrets.LEGION_PASS }} sftp://${{ secrets.LEGION_HOST }}:${{ secrets.LEGION_PORT }} <<EOF
          set sftp:auto-confirm yes
          set ssl:verify-certificate no
          cd /dist/Doriath-4k-20/sqlite/
          mget wurmzones.db wurmitems.db wurmplayers.db
          cd ../
          get top_layer.map
          bye
          EOF
          mv wurmzones.db wurmitems.db wurmplayers.db ./sqlite/

      - name: 4. Execution et Conversion
        run: |
          cat <<EOF > WurmMapGen.properties
          serverName=[QC/FR/CAN] QBC Doriath
          wurmMapLocation=.
          saveLocation=.
          dbDir=./sqlite/
          zonesDb=wurmzones.db
          itemsDb=wurmitems.db
          playersDb=wurmplayers.db
          enableRealtimeMarkers=false
          rmiHost=localhost
          rmiPort=8080
          markerType=2
          mapTileSize=256
          actualMapSize=4096
          mapMaxZoom=5
          EOF

          # Lancement du générateur
          java -Djava.awt.headless=true -Xmx6g -jar WurmMapGen.jar || true
          
          # NETTOYAGE ET CONVERSION AUTOMATIQUE
          echo "Conversion des fichiers en cours..."
          mkdir -p data
          
          # Renommage sécurisé (ne plante pas si aucun fichier n'existe)
          for f in data/*.php; do 
            [ -e "$f" ] || continue
            mv "$f" "${f%.php}.json"
          done
          
          # Suppression de tout reste potentiel
          rm -f data/*.php
          rm -f *.php
          
          sed -i "s|MAJ_DATE_ICI|$(date +'%Y-%m-%d %H:%M:%S')|g" index.html

      - name: 5. Synchronisation Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git reset --hard origin/main
          git add index.html data/ images/ || true
          git rm -f data/*.php || true
          if ! git diff --cached --quiet; then
            git commit -m "MAJ auto : carte et donnees JSON"
            git push origin main
          fi
