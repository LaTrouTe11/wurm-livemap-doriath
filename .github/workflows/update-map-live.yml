name: Synchro Carte Wurm Legion Hosting

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout du code source
        uses: actions/checkout@v4

      - name: 2. Installation paquets
        run: sudo apt-get update && sudo apt-get install -y lftp openjdk-17-jre

      - name: 3. Telechargement donnees
        run: |
          mkdir -p ./sqlite
          lftp -u "${{ secrets.LEGION_USER }},${{ secrets.LEGION_PASS }}" sftp://${{ secrets.LEGION_HOST }}:${{ secrets.LEGION_PORT }} <<EOF
          set sftp:auto-confirm yes
          set ssl:verify-certificate no
          set xfer:clobber on
          set sftp:connect-program "ssh -a -x -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
          cd /dist/Doriath-4k-20/sqlite/
          mget -O ./sqlite/ wurmzones.db wurmitems.db wurmplayers.db
          cd ../
          get -O . top_layer.map
          bye
          EOF

      - name: 4. Generation et Injection index.html
        run: |
          # Nettoyage
          find . -type f -name "*.php" -delete
          rm -f index.html
          mkdir -p template/app template/css template/data template/images template/markers template/dist template/includes

          # Injection index.html avec le <div id="gui">
          cat << 'EOF' > template/index.html
          <!DOCTYPE html>
          <html lang="fr">
          <head>
              <meta charset="utf-8" />
              <title>QBC Doriath - LiveMap</title>
              <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
              <link rel="stylesheet" href="css/style.css" />
          </head>
          <body>
              <div id="gui"></div>
              <div id="map" style="height:100vh; width:100%;"></div>
              <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
              <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>
              <script>window.WurmMapGen = {};</script>
              <script src="util.js"></script>
              <script src="markers.js"></script>
              <script src="map.js"></script>
              <script src="gui.js"></script>
              <script src="main.js"></script>
          </body>
          </html>
          EOF

          java -Djava.awt.headless=true -Xmx5g -jar WurmMapGen.jar
          cp -ru template/* .
          rm -rf template/ sqlite/ top_layer.map app/

      - name: 5. Push final
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "MAJ AUTO : Structure index et menu" || echo "Pas de modif"
          git push origin main

      - name: 6. Deploiement
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
  
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: {name: github-pages, url: '${{ steps.deployment.outputs.page_url }}'}
    steps:
      - name: Deploiement
        id: deployment
        uses: actions/deploy-pages@v4

