name: Synchro Carte Wurm Legion Hosting

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout du code source
        uses: actions/checkout@v4

      - name: 2. Installation des paquets requis
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y -o Dpkg::Options::="--force-confdef" -o Dpkg::Options::="--force-confold" lftp openjdk-17-jre

      - name: 3. Telechargement des donnees serveurs (.db et .map)
        run: |
          mkdir -p ./sqlite
          lftp -u "${{ secrets.LEGION_USER }},${{ secrets.LEGION_PASS }}" sftp://${{ secrets.LEGION_HOST }}:${{ secrets.LEGION_PORT }} <<EOF
          set sftp:auto-confirm yes
          set ssl:verify-certificate no
          set xfer:clobber on
          set sftp:connect-program "ssh -a -x -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
          cd /dist/Doriath-4k-20/sqlite/
          mget -O ./sqlite/ wurmzones.db wurmitems.db wurmplayers.db
          cd ../
          get -O . top_layer.map
          bye
          EOF

      - name: 4. Execution du Generateur et Injecteur de Secours
        run: |
          # 1. Sauvegarde de sécurité de vos scripts propres dans la mémoire temporaire de Linux
          mkdir -p /tmp/wurm_clean
          cp index.html main.js map.js gui.js diagnostic.html /tmp/wurm_clean/ 2>/dev/null || true
          
          # 2. Création de la structure de répertoires exigée par le binaire Java
          mkdir -p template/app template/css template/data template/images template/markers template/dist template/includes
          
          # 3. Exécution brute du générateur WurmMapGen.jar
          java -Djava.awt.headless=true -Xmx5g -jar WurmMapGen.jar
          
          # 4. RESTAURATION STRATEGIQUE DE FORCE : Écrase les vieux scripts par défaut extraits par Java
          cp -f /tmp/wurm_clean/index.html ./index.html 2>/dev/null || true
          cp -f /tmp/wurm_clean/main.js ./main.js 2>/dev/null || true
          cp -f /tmp/wurm_clean/map.js ./map.js 2>/dev/null || true
          cp -f /tmp/wurm_clean/gui.js ./gui.js 2>/dev/null || true
          cp -f /tmp/wurm_clean/diagnostic.html ./diagnostic.html 2>/dev/null || true
          
          # 5. INJECTION SYSTEME DES CADRAGES CDN (Règle définitivement l'erreur L is not defined)
          if [ -f "index.html" ]; then
            sed -i '/<head>/a \    <script src="https://unpkg.com"></script>\n    <script src="https://jsdelivr.net"></script>\n    <script src="https://jsdelivr.net"></script>' index.html
          fi
          if [ -f "diagnostic.html" ]; then
            sed -i '/<head>/a \    <script src="https://unpkg.com"></script>\n    <script src="https://jsdelivr.net"></script>\n    <script src="https://jsdelivr.net"></script>' diagnostic.html
          fi

          # 6. FORCE-PATCH DU CONFIG.JSON : Évite les conflits de ports RMI
          if [ -f "data/config.json" ]; then
            sed -i 's/"rmiPort":[0-9]*/"rmiPort":5606/g' data/config.json
          fi

          # 7. Tri et nettoyage strict des scripts serveurs dans data/
          if [ -d "data" ]; then
            find data/ -type f ! -name "*.json" -delete
          fi
          
          # 8. REPARATION DE LA VIRGULE : Corrige le bug natif de la v2.33 dans markers.js
          if [ -f "markers.js" ]; then
            sed -i 's/iconSize:[[:space:]]*,/iconSize:,/g' markers.js
            sed -i 's/iconAnchor:[[:space:]]*,/iconAnchor:,/g' markers.js
          fi

          # 9. Purge des dossiers lourds obsolètes avant la mise en ligne
          rm -rf sqlite/
          rm -f top_layer.map
          rm -rf template/
          rm -rf app/
          rm -f data/*.php

      - name: 5. Creation et televersement de l'artefact Web
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 6. Deploiement en ligne sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4



