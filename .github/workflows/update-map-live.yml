name: Synchro Carte Wurm Legion Hosting

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout du code source
        uses: actions/checkout@v4

      - name: 2. Installation des paquets requis
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y -o Dpkg::Options::="--force-confdef" -o Dpkg::Options::="--force-confold" lftp openjdk-17-jre wget

      - name: 3. Telechargement des donnees serveurs (.db et .map)
        run: |
          mkdir -p ./sqlite
          lftp -u "${{ secrets.LEGION_USER }},${{ secrets.LEGION_PASS }}" sftp://${{ secrets.LEGION_HOST }}:${{ secrets.LEGION_PORT }} <<EOF
          set sftp:auto-confirm yes
          set ssl:verify-certificate no
          set xfer:clobber on
          set sftp:connect-program "ssh -a -x -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
          cd /dist/Doriath-4k-20/sqlite/
          mget -O ./sqlite/ wurmzones.db wurmitems.db wurmplayers.db
          cd ../
          get -O . top_layer.map
          bye
          EOF

      - name: 4. Telechargement automatique et Execution de WurmMapDump (Moderne)
        run: |
          # 1. Création d'une zone de build temporaire isolée
          mkdir -p /tmp/wurm_dump_zone
          cd /tmp/wurm_dump_zone
          
          # 2. Téléchargement automatique de l'outil moderne officiel depuis les dépôts communautaires
          wget -q -O WurmMapDump.jar https://github.com 2>/dev/null || wget -q -O WurmMapDump.jar https://github.com
          
          # 3. Copie des fichiers sources de Doriath pour traitement
          cp $GITHUB_WORKSPACE/top_layer.map .
          cp -r $GITHUB_WORKSPACE/sqlite .
          
          # 4. Exécution du nouveau binaire (Génération topographique 4k)
          java -jar WurmMapDump.jar -map top_layer.map -dbdir ./sqlite -output ./dist_map -image TypeTopographical -tileSize 256
          
          # 5. Rapatriement ciblé des images et des données vers votre dépôt racine
          mkdir -p $GITHUB_WORKSPACE/images $GITHUB_WORKSPACE/data
          if [ -d "./dist_map/images" ]; then cp -f ./dist_map/images/*.png $GITHUB_WORKSPACE/images/ 2>/dev/null || true; fi
          if [ -d "./dist_map/data" ]; then cp -f ./dist_map/data/*.json $GITHUB_WORKSPACE/data/ 2>/dev/null || true; fi
          
          # 6. Purge complète des dossiers résiduels de la machine virtuelle
          cd $GITHUB_WORKSPACE
          rm -rf sqlite/ top_layer.map /tmp/wurm_dump_zone

      - name: 5. Sauvegarde persistante Git (Vitesse instantanée)
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add images/ data/ index.html WurmMapGen.properties
          git diff-index --quiet HEAD || git commit -m "MAJ auto : bascule et rendu via WurmMapDump moderne"
          git push origin main || true

      - name: 6. Creation et televersement de l'artefact Web
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 7. Deploiement en ligne sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4




