name: Synchro Carte Wurm Legion Hosting

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout du code source
        uses: actions/checkout@v4

      - name: 2. Installation des paquets
        run: sudo apt-get update && sudo apt-get install -y lftp openjdk-17-jre

      - name: 3. Telechargement des donnees serveurs
        run: |
          mkdir -p ./sqlite
          lftp -u "${{ secrets.LEGION_USER }},${{ secrets.LEGION_PASS }}" sftp://${{ secrets.LEGION_HOST }}:${{ secrets.LEGION_PORT }} <<EOF
          set sftp:auto-confirm yes
          set ssl:verify-certificate no
          set xfer:clobber on
          set sftp:connect-program "ssh -a -x -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
          cd /dist/Doriath-4k-20/sqlite/
          mget -O ./sqlite/ wurmzones.db wurmitems.db wurmplayers.db
          cd ../
          get -O . top_layer.map
          bye
          EOF

      - name: 4. Generation de la carte et injection index.html
        run: |
          # Nettoyage préventif
          find . -type f -name "*.php" -delete
          mkdir -p template/app template/css template/data template/images template/markers template/dist template/includes

          # Injection du index.html corrigé
          cat << 'EOF' > index.html
          <!DOCTYPE html>
          <html lang="fr">
          <head>
              <meta charset="utf-8" />
              <title>QBC Doriath - LiveMap</title>
              <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
              <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
              <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.min.js"></script>
              <link rel="stylesheet" href="css/style.css" />
              <script>window.WurmMapGen = window.WurmMapGen || {};</script>
              <script src="util.js" defer></script>
              <script src="markers.js" defer></script>
              <script src="map.js" defer></script>
              <script src="gui.js" defer></script>
              <script src="main.js" defer></script>
          </head>
          <body>
              <div id="map" style="height:100vh; width:100%;"></div>
          </body>
          </html>
          EOF

          # Génération
          cp index.html template/index.html
          java -Djava.awt.headless=true -Xmx5g -jar WurmMapGen.jar
          
          # Synchronisation racine intelligente
          cp -ru template/* .
          find data/ -type f -name "*.php" -delete
          rm -rf template/ sqlite/ top_layer.map app/

      - name: 5. Push Git final
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff-index --quiet HEAD || (git commit -m "MAJ AUTO : Synchronisation racine propre" && git push origin main)

      - name: 6. Deploiement GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
  
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: {name: github-pages, url: '${{ steps.deployment.outputs.page_url }}'}
    steps:
      - name: Deploiement
        id: deployment
        uses: actions/deploy-pages@v4


