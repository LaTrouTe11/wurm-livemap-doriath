name: Synchro Carte Wurm Legion Hosting

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout du code source
        uses: actions/checkout@v4

      - name: 2. Installation des paquets requis
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y -o Dpkg::Options::="--force-confdef" -o Dpkg::Options::="--force-confold" lftp openjdk-17-jre

      - name: 3. Telechargement des donnees serveurs (.db et .map)
        run: |
          mkdir -p ./sqlite
          lftp -u "${{ secrets.LEGION_USER }},${{ secrets.LEGION_PASS }}" sftp://${{ secrets.LEGION_HOST }}:${{ secrets.LEGION_PORT }} <<EOF
          set sftp:auto-confirm yes
          set ssl:verify-certificate no
          set xfer:clobber on
          set sftp:connect-program "ssh -a -x -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
          cd /dist/Doriath-4k-20/sqlite/
          mget -O ./sqlite/ wurmzones.db wurmitems.db wurmplayers.db
          cd ../
          get -O . top_layer.map
          bye
          EOF

      - name: 4. Execution du Generateur en Zone Isolee
        run: |
          # 1. Création d'un répertoire temporaire pour isoler l'outil Java
          mkdir -p /tmp/wurm_build_zone
          cp WurmMapGen.jar WurmMapGen.properties top_layer.map /tmp/wurm_build_zone/
          cp -r sqlite /tmp/wurm_build_zone/
          
          # 2. Création de la structure minimale demandée par Java dans la zone isolée
          mkdir -p /tmp/wurm_build_zone/template/app /tmp/wurm_build_zone/template/css /tmp/wurm_build_zone/template/data /tmp/wurm_build_zone/template/images /tmp/wurm_build_zone/template/markers /tmp/wurm_build_zone/template/dist /tmp/wurm_build_zone/template/includes
          
          # 3. Exécution du générateur à l'abri à l'intérieur du dossier temporaire
          cd /tmp/wurm_build_zone
          java -Djava.awt.headless=true -Xmx5g -jar WurmMapGen.jar
          cd $GITHUB_WORKSPACE
          
          # 4. RÉCUPÉRATION CIBLÉE : On rapatrie uniquement les images et les JSON sans toucher à l'index.html
          mkdir -p images data
          if [ -d "/tmp/wurm_build_zone/images" ]; then cp -f /tmp/wurm_build_zone/images/*.png ./images/ 2>/dev/null || true; fi
          if [ -d "/tmp/wurm_build_zone/data" ]; then cp -f /tmp/wurm_build_zone/data/*.json ./data/ 2>/dev/null || true; fi

          # 5. Nettoyage complet de la zone temporaire de Linux
          rm -rf sqlite/ top_layer.map /tmp/wurm_build_zone

      - name: 5. Sauvegarde persistante des nouvelles images sur votre GitHub
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add images/ data/ index.html WurmMapGen.properties
          # On enregistre les modifications de terrain uniquement s'il y en a
          git diff-index --quiet HEAD || git commit -m "MAJ auto : synchronisation des tuiles de terrain doriath"
          git push origin main || true

      - name: 6. Creation et televersement de l'artefact Web pour Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 7. Deploiement en ligne sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4



