name: Synchro Carte Wurm Legion Hosting

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout du code source
        uses: actions/checkout@v4

      - name: 2. Installation des paquets requis
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp openjdk-17-jre

      - name: 3. Telechargement des donnees serveurs (.db et .map)
        run: |
          mkdir -p ./sqlite
          lftp -u "${{ secrets.LEGION_USER }},${{ secrets.LEGION_PASS }}" sftp://${{ secrets.LEGION_HOST }}:${{ secrets.LEGION_PORT }} <<EOF
          set sftp:auto-confirm yes
          set ssl:verify-certificate no
          set xfer:clobber on
          cd /dist/Doriath-4k-20/sqlite/
          mget -O ./sqlite/ wurmzones.db wurmitems.db wurmplayers.db
          cd ../
          get -O . top_layer.map
          bye
          EOF

      - name: 4. Execution du Generateur avec Securite Hybride
        run: |
          # Sauvegarde du fichier index propre
          cp index.html /tmp/index_hybride.html
          
          # Création de l'arborescence requise par l'outil Java
          mkdir -p template/app template/css template/data template/images template/markers template/dist template/includes
          cp /tmp/index_hybride.html template/index.html
          
          # Configuration RMI
          if [ -f "WurmMapGen.properties" ]; then
            sed -i 's/rmiHost=.*/rmiHost=${{ secrets.LEGION_HOST }}/g' WurmMapGen.properties
            sed -i 's/rmiPort=.*/rmiPort=5606/g' WurmMapGen.properties
            sed -i 's/enableRealtimeMarkers=.*/enableRealtimeMarkers=true/g' WurmMapGen.properties
          fi

          # Exécution de l'outil Java
          java -Djava.awt.headless=true -Xmx5g -jar WurmMapGen.jar
          
          # Restauration forcée de l'index hybride compatible
          cp -f /tmp/index_hybride.html ./index.html
          
          # Nettoyage des dossiers temporaires
          rm -rf sqlite/ top_layer.map template/ app/ dist/ includes/
          if [ -d "data" ]; then find data/ -type f ! -name "*.json" -delete; fi

      - name: 5. Sauvegarde persistante Git (Vitesse instantanee)
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add images/ data/ index.html WurmMapGen.properties
          git diff-index --quiet HEAD || git commit -m "MAJ auto : synchronisation incrementale 2026"
          git push origin main || true

      - name: 6. Creation et televersement de l'artefact Web
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 7. Deploiement en ligne sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4



