
name: Synchro Carte Wurm Legion Hosting

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

# ... (permissions et config inchangées)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout du code source
        uses: actions/checkout@v4

      - name: 2. Installation des paquets
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp openjdk-17-jre

      - name: 3. Telechargement des donnees serveurs
        run: |
          mkdir -p ./sqlite
          lftp -u "${{ secrets.LEGION_USER }},${{ secrets.LEGION_PASS }}" sftp://${{ secrets.LEGION_HOST }}:${{ secrets.LEGION_PORT }} <<EOF
          # ... (commandes sftp inchangées)
          bye
          EOF

      - name: 4. Execution du Generateur et Correction
        run: |
          # ... (copie index, java, etc.)
          
          # FORCE-FIX : Correction automatisée du bug de la virgule dans markers.js
          if [ -f "markers.js" ]; then
            sed -i 's/iconSize:[[:space:]]*,/iconSize:[32, 37],/g' markers.js
            sed -i 's/iconAnchor:[[:space:]]*,/iconAnchor:[16, 37],/g' markers.js
          fi
          # ... (nettoyage)

      - name: 5. Creation et televersement de l'artefact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    # ... (inchangé)


