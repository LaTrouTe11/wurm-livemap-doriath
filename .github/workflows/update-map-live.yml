name: Synchro Carte Wurm Legion Hosting

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout du code source
        uses: actions/checkout@v4

      - name: 2. Installation des paquets requis
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp openjdk-17-jre

      - name: 3. Telechargement des donnees serveurs (.db et .map)
        run: |
          mkdir -p ./sqlite
          lftp -u "${{ secrets.LEGION_USER }},${{ secrets.LEGION_PASS }}" sftp://${{ secrets.LEGION_HOST }}:${{ secrets.LEGION_PORT }} <<EOF
          set sftp:auto-confirm yes
          set ssl:verify-certificate no
          set xfer:clobber on
          cd /dist/Doriath-4k-20/sqlite/
          mget -O ./sqlite/ wurmzones.db wurmitems.db wurmplayers.db
          cd ../
          get -O . top_layer.map
          bye
          EOF

      - name: 4. Execution Directe Securisee du Generateur
        run: |
          # 1. Sauvegarde index.html
          mkdir -p /tmp/wurm_web_save
          cp index.html /tmp/wurm_web_save/index.html
          
          # 2. Structure pour Java
          mkdir -p template/app template/css template/data template/images template/markers
          cp /tmp/wurm_web_save/index.html template/index.html
          
          # 3. Injection configuration RMI (Port 5606)
          if [ -f "WurmMapGen.properties" ]; then
            sed -i 's/rmiHost=.*/rmiHost=${{ secrets.LEGION_HOST }}/g' WurmMapGen.properties
            sed -i 's/rmiPort=.*/rmiPort=5606/g' WurmMapGen.properties
            sed -i 's/enableRealtimeMarkers=.*/enableRealtimeMarkers=true/g' WurmMapGen.properties
          fi

          # 4. Exécution (Génère le terrain)
          java -Djava.awt.headless=true -Xmx5g -jar WurmMapGen.jar
          
          # 5. Restauration de sécurité
          cp -f /tmp/wurm_web_save/index.html ./index.html
          
          # 6. Nettoyage
          rm -rf sqlite/ top_layer.map template/
          if [ -d "data" ]; then find data/ -type f ! -name "*.json" -delete; fi

      - name: 5. Sauvegarde persistante Git
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add images/ data/ index.html
          git diff-index --quiet HEAD || git commit -m "MAJ auto : synchronisation"
          git push origin main || true

      - name: 6. Creation et televersement de l'artefact Web
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 7. Deploiement en ligne
        uses: actions/deploy-pages@v4


