name: Synchro Carte Wurm Legion Hosting

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4

      - name: 2. Installation
        run: sudo apt-get update && sudo apt-get install -y lftp openjdk-17-jre

      - name: 3. Telechargement des donnees
        run: |
          mkdir -p ./sqlite
          lftp -u ${{ secrets.LEGION_USER }},${{ secrets.LEGION_PASS }} sftp://${{ secrets.LEGION_HOST }}:${{ secrets.LEGION_PORT }} <<EOF
          set sftp:auto-confirm yes
          set ssl:verify-certificate no
          cd /dist/Doriath-4k-20/sqlite/
          mget wurmzones.db wurmitems.db wurmplayers.db
          cd ../
          get top_layer.map
          bye
          EOF
          mv wurmzones.db wurmitems.db wurmplayers.db ./sqlite/

      - name: 4. Execution et Conversion
        run: |
          cat <<EOF > WurmMapGen.properties
          serverName=[QC/FR/CAN] QBC Doriath
          wurmMapLocation=.
          saveLocation=.
          dbDir=./sqlite/
          zonesDb=wurmzones.db
          itemsDb=wurmitems.db
          playersDb=wurmplayers.db
          enableRealtimeMarkers=false
          rmiHost=localhost
          rmiPort=8080
          markerType=2
          mapTileSize=256
          actualMapSize=4096
          mapMaxZoom=5
          EOF

          # Lancement du générateur
          java -Djava.awt.headless=true -Xmx6g -jar WurmMapGen.jar || true
          
          # Nettoyage total des vieux fichiers .php avant conversion
          rm -f data/*.php
          
          # Conversion des fichiers .php en .json
          mkdir -p data
          for f in data/*.php; do [ -e "$f" ] && mv "$f" "${f%.php}.json"; done

      - name: 4b. Nettoyage et synchronisation du site
        run: |
          # 1. On supprime tout à la racine sauf les dossiers vitaux
          find . -maxdepth 1 ! -name '.' ! -name '.git' ! -name '.github' ! -name 'template' ! -name 'data' ! -name 'WurmMapGen*' ! -name 'update-map-live.yml' -exec rm -rf {} +
          
          # 2. On copie tout le contenu du template vers la racine
          cp -r template/* .

      - name: 5. Synchronisation Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add . 
          
          if ! git diff --cached --quiet; then
            git commit -m "MAJ auto : synchronisation site et donnees (Nettoyage PHP)"
            git push origin main
          fi
