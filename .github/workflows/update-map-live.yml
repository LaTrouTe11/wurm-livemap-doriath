name: Synchro Carte Wurm Legion Hosting

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout du code source
        uses: actions/checkout@v4

      - name: 2. Installation des paquets requis
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp openjdk-17-jre

      - name: 3. Telechargement des donnees serveurs (.db et .map)
        run: |
          mkdir -p ./sqlite
          lftp -u "${{ secrets.LEGION_USER }},${{ secrets.LEGION_PASS }}" sftp://${{ secrets.LEGION_HOST }}:${{ secrets.LEGION_PORT }} <<EOF
          set sftp:auto-confirm yes
          set ssl:verify-certificate no
          set xfer:clobber on
          set sftp:connect-program "ssh -a -x -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
          cd /dist/Doriath-4k-20/sqlite/
          mget -O ./sqlite/ wurmzones.db wurmitems.db wurmplayers.db
          cd ../
          get -O . top_layer.map
          bye
          EOF

      - name: 4. Generation du Terrain et Ecriture Forcee de l'Index Racine Corrige
        run: |
          # 1. Nettoyage du fichier de configuration properties pour éliminer les doublons de mots de passe
          if [ -f "WurmMapGen.properties" ]; then
            sed -i '/rmiPassword/d' WurmMapGen.properties
            sed -i 's/rmiHost=.*/rmiHost=${{ secrets.LEGION_HOST }}/g' WurmMapGen.properties
            sed -i 's/rmiPort=.*/rmiPort=5606/g' WurmMapGen.properties
            sed -i 's/enableRealtimeMarkers=.*/enableRealtimeMarkers=true/g' WurmMapGen.properties
            echo "rmiPassword=${{ secrets.RMI_PASSEWORD }}" >> WurmMapGen.properties
          fi

          # 2. Création de la structure requise par Java
          mkdir -p template/app template/css template/data template/images template/markers template/dist template/includes

          # 3. ÉCRITURE FORCÉE DE L'INDEX HYBRIDE SÉCURISÉ (Garantit les valeurs 0, 4096)
          cat << 'EOF' > index.html
          <!DOCTYPE html>
          <html lang="fr">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>[QC/FR/CAN] QBC Doriath - LiveMap</title>
              <link rel="stylesheet" href="https://unpkg.com" />
              <script src="https://unpkg.com"></script>
              <link rel="stylesheet" href="css/style.css" />
              <style>
                  html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #1a1a24; }
                  #gui { position: absolute; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
                  #sidebar { pointer-events: auto; background: #22222b !important; color: #fff !important; border-right: 2px solid #2196F3; left: 0 !important; width: 240px; }
                  #sidebar .block { display: block !important; border-bottom: 1px solid #3a3a4a !important; }
                  #sidebar h1 { color: #2196F3; font-size: 16px; margin-bottom: 5px; }
                  #sidebar p { color: #888; font-size: 12px; }
                  #map { position: absolute; top: 0; bottom: 0; right: 0; left: 240px !important; width: calc(100vw - 240px) !important; height: 100vh; background-color: #15151c; z-index: 1; pointer-events: auto; }
                  .filter-item { display: flex; align-items: center; gap: 8px; padding: 6px 0; font-size: 13px; cursor: pointer; }
              </style>
          </head>
          <body>
              <div id="gui">
                  <div id="sidebar" class="loaded">
                      <div class="block padding">
                          <h1>QBC Doriath</h1>
                          <p id="playercount">Interactive LiveMap</p>
                      </div>
                      <div class="block">
                          <div style="font-size: 11px; text-transform: uppercase; color: #666; font-weight: bold; margin-bottom: 10px; letter-spacing: 1px;">Calques</div>
                          <label class="filter-item"><input type="checkbox" id="chk-villages" checked onchange="toggleLayer('villages')"> Villages (Deeds)</label>
                          <label class="filter-item"><input type="checkbox" id="chk-towers" checked onchange="toggleLayer('towers')"> Tours de garde</label>
                      </div>
                      <div class="block">
                          <div style="font-size: 11px; text-transform: uppercase; color: #666; font-weight: bold; margin-bottom: 10px; letter-spacing: 1px;">Index</div>
                          <div style="padding: 6px 8px; background: #2a2a35; border-radius: 4px; cursor: pointer; font-size: 13px; border-left: 3px solid #2196F3;" onclick="focusOn(2048, 2048)">📍 Centre du Monde</div>
                      </div>
                  </div>
              </div>
              <div id="map"></div>
              <script>
                  window.addEventListener('load', function() {
                      window.WurmMapGen = window.WurmMapGen || {};
                      var map = L.map('map', { crs: L.CRS.Simple, minZoom: 0, maxZoom: 5, zoomControl: true, attributionControl: false });
                      var mapBounds = new L.LatLngBounds(map.unproject([0, 4096], 5), map.unproject([4096, 0], 5));
                      map.fitBounds(mapBounds);
                      map.setZoom(2);
                      L.tileLayer('images/{x}-{y}.png', { tileSize: 256, noWrap: true, tms: true }).addTo(map);
                      var layers = { villages: L.layerGroup().addTo(map), towers: L.layerGroup().addTo(map) };
                      window.toggleLayer = function(type) {
                          var chk = document.getElementById('chk-' + type);
                          if (chk.checked) { map.addLayer(layers[type]); } else { map.removeLayer(layers[type]); }
                      };
                      window.focusOn = function(x, y) { map.setView(map.unproject([x, y], 5), 4); };
                      fetch('data/villages.json')
                          .then(res => res.json())
                          .then(data => {
                              data.forEach(v => {
                                  var marker = L.marker(map.unproject([v.x, v.y], 5));
                                  marker.bindPopup(`<b>${v.name}</b><br>Maire: ${v.mayor}`);
                                  layers.villages.addLayer(marker);
                              });
                          }).catch(() => console.log("JSON chargé."));
                  });
              </script>
          </body>
          </html>
          EOF
          
          # 4. Copie du fichier modèle requis pour satisfaire Java sans écraser le code racine
          cp index.html template/index.html

          # 5. Exécution sécurisée de l'outil Java
          java -Djava.awt.headless=true -Xmx5g -jar WurmMapGen.jar
          
          # 6. Nettoyage strict des fichiers temporaires lourds
          rm -rf sqlite/ top_layer.map template/ app/ dist/ includes/
          if [ -d "data" ]; then find data/ -type f ! -name "*.json" -delete; fi

      - name: 5. Sauvegarde Persistante et Push Git (Changements visibles instantanés)
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add images/ data/ index.html WurmMapGen.properties
          # Ce commit va pousser de force les modifications sur votre historique GitHub visible
          git diff-index --quiet HEAD || git commit -m "MAJ auto : reconstruction et synchronisation visible de l'index racine"
          git push origin main || true

      - name: 6. Creation et televersement de l'artefact Web
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 7. Deploiement en ligne sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4



