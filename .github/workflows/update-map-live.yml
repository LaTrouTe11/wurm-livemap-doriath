name: Synchro Carte Wurm Legion Hosting

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4

      - name: 2. Installation
        run: sudo apt-get update && sudo apt-get install -y lftp openjdk-17-jre

      - name: 3. Telechargement donnees
        run: |
          mkdir -p ./sqlite
          lftp -u "${{ secrets.LEGION_USER }},${{ secrets.LEGION_PASS }}" sftp://${{ secrets.LEGION_HOST }}:${{ secrets.LEGION_PORT }} <<EOF
          set sftp:auto-confirm yes
          set ssl:verify-certificate no
          set xfer:clobber on
          set sftp:connect-program "ssh -a -x -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
          cd /dist/Doriath-4k-20/sqlite/
          mget -O ./sqlite/ wurmzones.db wurmitems.db wurmplayers.db
          cd ../
          get -O . top_layer.map
          bye
          EOF

      - name: 4. Generation
        run: |
          # On remplace proprement l'index.html
          cat << 'EOF' > index.html
          <!DOCTYPE html>
          <html lang="fr">
          <head>
              <meta charset="utf-8" />
              <title>QBC Doriath - LiveMap</title>
              <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
              <link rel="stylesheet" href="css/style.css" />
          </head>
          <body>
              <div id="gui"></div>
              <div id="map" style="height:100vh; width:100%;"></div>
              <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
              <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>
              <script src="https://cdn.jsdelivr.net/npm/js-cookie@3.0.1/dist/js.cookie.min.js"></script>
              <script>window.WurmMapGen = {};</script>
              <script src="util.js"></script>
              <script src="markers.js"></script>
              <script src="map.js"></script>
              <script src="gui.js"></script>
              <script src="main.js"></script>
          </body>
          </html>
          EOF

          # Génération de la carte
          java -Djava.awt.headless=true -Xmx5g -jar WurmMapGen.jar
          
          # Nettoyage sécurisé : uniquement le fichier temporaire utilisé pour la génération
          rm -f top_layer.map

      - name: 5. Push final
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # Ajout uniquement des éléments de la carte
          git add index.html tiles/ || echo "Aucun changement détecté"
          git commit -m "MAJ AUTO : Synchronisation des tuiles et index" || echo "Rien à commiter"
          git push origin main
