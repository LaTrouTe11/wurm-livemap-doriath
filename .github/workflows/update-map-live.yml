name: Synchro Carte Wurm Legion Hosting

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout du code source
        uses: actions/checkout@v4

      - name: 2. Installation des paquets requis
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y -o Dpkg::Options::="--force-confdef" -o Dpkg::Options::="--force-confold" lftp openjdk-17-jre

      - name: 3. Telechargement des donnees serveurs (.db et .map)
        run: |
          mkdir -p ./sqlite
          lftp -u "${{ secrets.LEGION_USER }},${{ secrets.LEGION_PASS }}" sftp://${{ secrets.LEGION_HOST }}:${{ secrets.LEGION_PORT }} <<EOF
          set sftp:auto-confirm yes
          set ssl:verify-certificate no
          set xfer:clobber on
          set sftp:connect-program "ssh -a -x -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
          cd /dist/Doriath-4k-20/sqlite/
          mget -O ./sqlite/ wurmzones.db wurmitems.db wurmplayers.db
          cd ../
          get -O . top_layer.map
          bye
          EOF

      - name: 4. Execution du Generateur en Mode Incremental
        run: |
          # 1. Structure minimale exigée par le binaire Java
          mkdir -p template/app template/css template/data template/images template/markers template/dist template/includes
          cp index.html template/index.html
          
          # 2. Exécution du générateur Java (Il va écraser uniquement les images modifiées)
          java -Djava.awt.headless=true -Xmx5g -jar WurmMapGen.jar
          
          # 3. Restauration forcée de votre index de type wu-map
          cp -f template/index.html ./index.html
          
          # 4. Nettoyage ciblé : On détruit les bases SQL de 5 Go et les structures temporaires, MAIS ON GARDE LE DOSSIER IMAGES/
          rm -rf sqlite/
          rm -f top_layer.map
          rm -rf template/
          rm -rf app/
          if [ -d "data" ]; then find data/ -type f ! -name "*.json" -delete; fi

      - name: 5. Synchronisation intelligente Git (Envoie uniquement les tuiles qui ont changé)
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add images/ data/ index.html
          # Le script vérifie s'il y a de réels changements (ex: un nouvel arbre coupé ou une maison construite)
          git diff-index --quiet HEAD || git commit -m "MAJ auto : synchronisation des tuiles modifiees"
          git push origin main || true

      - name: 6. Creation et televersement de l'artefact Web
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 7. Deploiement en ligne sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4



