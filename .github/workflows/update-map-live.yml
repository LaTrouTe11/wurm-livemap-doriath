name: Synchro Carte Wurm Legion Hosting

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4

      - name: 2. Installation
        run: sudo apt-get update && sudo apt-get install -y lftp openjdk-17-jre

      - name: 3. Telechargement donnees
        run: |
          mkdir -p ./sqlite
          lftp -u "${{ secrets.LEGION_USER }},${{ secrets.LEGION_PASS }}" sftp://${{ secrets.LEGION_HOST }}:${{ secrets.LEGION_PORT }} <<EOF
          set sftp:auto-confirm yes
          set ssl:verify-certificate no
          set xfer:clobber on
          cd /dist/Doriath-4k-20/sqlite/
          mget -O ./sqlite/ wurmzones.db wurmitems.db wurmplayers.db
          cd ../
          get -O . top_layer.map
          bye
          EOF

      - name: 4. Generation
        run: |
          # Génération de la carte
          java -Djava.awt.headless=true -Xmx5g -jar WurmMapGen.jar
          
          # Création du dossier cible dans docs/tiles
          mkdir -p docs/tiles
          
          # Déplacement des tuiles vers le nouveau dossier docs/tiles/
          find . -maxdepth 1 \( -name "*.png" -o -name "*.json" \) -exec mv {} docs/tiles/ \; || echo "Aucune tuile trouvée à la racine"
          
          # Nettoyage
          rm -f top_layer.map

      - name: 5. Push final
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # On ajoute tout, y compris les changements dans docs/
          git add -A
          git commit -m "MAJ AUTO : Synchronisation des données et tuiles dans docs/" || echo "Rien à commiter"
          git push origin main
