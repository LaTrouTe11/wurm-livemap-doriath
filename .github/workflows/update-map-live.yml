name: Synchro Carte Wurm Legion Hosting

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout du code source
        uses: actions/checkout@v4

      - name: 2. Installation des paquets requis
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y -o Dpkg::Options::="--force-confdef" -o Dpkg::Options::="--force-confold" lftp openjdk-17-jre

      - name: 3. Telechargement des donnees serveurs (.db et .map)
        run: |
          mkdir -p ./sqlite
          lftp -u "${{ secrets.LEGION_USER }},${{ secrets.LEGION_PASS }}" sftp://${{ secrets.LEGION_HOST }}:${{ secrets.LEGION_PORT }} <<EOF
          set sftp:auto-confirm yes
          set ssl:verify-certificate no
          set xfer:clobber on
          set sftp:connect-program "ssh -a -x -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
          cd /dist/Doriath-4k-20/sqlite/
          mget -O ./sqlite/ wurmzones.db wurmitems.db wurmplayers.db
          cd ../
          get -O . top_layer.map
          bye
          EOF

      - name: 4. Execution du Generateur en Zone Isolee
        run: |
          mkdir -p /tmp/wurm_isolated
          cp WurmMapGen.jar WurmMapGen.properties top_layer.map /tmp/wurm_isolated/
          cp -r sqlite /tmp/wurm_isolated/
          
          mkdir -p /tmp/wurm_isolated/template
          cp index.html /tmp/wurm_isolated/template/index.html
          
          if [ -f "/tmp/wurm_isolated/WurmMapGen.properties" ]; then
            sed -i 's/rmiHost=.*/rmiHost=${{ secrets.LEGION_HOST }}/g' /tmp/wurm_isolated/WurmMapGen.properties
            sed -i 's/rmiPort=.*/rmiPort=5606/g' /tmp/wurm_isolated/WurmMapGen.properties
            sed -i 's/enableRealtimeMarkers=.*/enableRealtimeMarkers=true/g' /tmp/wurm_isolated/WurmMapGen.properties
            echo "rmiPassword=${{ secrets.RMI_PASSEWORD }}" >> /tmp/wurm_isolated/WurmMapGen.properties
          fi

          cd /tmp/wurm_isolated
          java -Djava.awt.headless=true -Xmx5g -jar WurmMapGen.jar
          cd $GITHUB_WORKSPACE
          
          mkdir -p images data
          if [ -d "/tmp/wurm_isolated/images" ]; then cp -f /tmp/wurm_isolated/images/*.png ./images/ 2>/dev/null || true; fi
          if [ -d "/tmp/wurm_isolated/data" ]; then cp -f /tmp/wurm_isolated/data/*.json ./data/ 2>/dev/null || true; fi
          
          rm -rf sqlite/ top_layer.map /tmp/wurm_isolated

      - name: 5. Sauvegarde persistante Git (Vitesse instantanee)
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add images/ data/ index.html WurmMapGen.properties
          git diff-index --quiet HEAD || git commit -m "MAJ auto : synchronisation incrementale du terrain"
          git push origin main || true

      - name: 6. Creation et televersement de l'artefact Web
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 7. Deploiement en ligne sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
