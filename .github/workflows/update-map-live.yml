name: Synchro Carte Wurm Legion Hosting

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout depot
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '17' }

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Telechargement bases donnees
        run: |
          mkdir -p ./sqlite
          lftp -c "set sftp:auto-confirm yes; set ssl:verify-certificate no; open sftp://${{ secrets.LEGION_USER }}:${{ secrets.LEGION_PASS }}@${{ secrets.LEGION_HOST }}:${{ secrets.LEGION_PORT }}; \
          get /dist/Doriath-4k-20/sqlite/wurmzones.db -o ./sqlite/wurmzones.db; \
          get /dist/Doriath-4k-20/sqlite/wurmitems.db -o ./sqlite/wurmitems.db; \
          get /dist/Doriath-4k-20/sqlite/wurmplayers.db -o ./sqlite/wurmplayers.db; \
          get /dist/Doriath-4k-20/top_layer.map -o ./sqlite/top_layer.map; \
          bye"
          # COPIE FORCEE A LA RACINE (Solution miracle pour FileNotFoundError)
          cp -f ./sqlite/* ./

      - name: Execution WurmMapGen
        run: java -Djava.awt.headless=true -Xmx3g -jar WurmMapGen.jar

      - name: Finalisation assets
        run: |
          mkdir -p ./data
          cp -f template/index.html index.html
          sed -i "s|2026-06-27 a 04:00:00|$(date +'%Y-%m-%d a %H:%M:%S')|g" index.html

      - name: Envoi au depot
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ images/ index.html || true
          if ! git diff --cached --quiet; then
            git commit -m "MAJ auto carte"
            git push origin main
          fi

      - name: Upload et Deploiement
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
