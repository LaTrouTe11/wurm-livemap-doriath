name: Synchro Carte Wurm Legion Hosting

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout du code source
        uses: actions/checkout@v4

      - name: 2. Installation des paquets requis
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y -o Dpkg::Options::="--force-confdef" -o Dpkg::Options::="--force-confold" lftp openjdk-17-jre

      - name: 3. Telechargement des donnees serveurs (.db et .map)
        run: |
          mkdir -p ./sqlite
          lftp -u "${{ secrets.LEGION_USER }},${{ secrets.LEGION_PASS }}" sftp://${{ secrets.LEGION_HOST }}:${{ secrets.LEGION_PORT }} <<EOF
          set sftp:auto-confirm yes
          set ssl:verify-certificate no
          set xfer:clobber on
          set sftp:connect-program "ssh -a -x -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
          cd /dist/Doriath-4k-20/sqlite/
          mget -O ./sqlite/ wurmzones.db wurmitems.db wurmplayers.db
          cd ../
          get -O . top_layer.map
          bye
          EOF

      - name: 4. Execution du Generateur et Alignement Force
        run: |
          # 1. Sauvegarde de sécurité de votre code propre
          mkdir -p /tmp/wurm_clean_code
          cp index.html main.js map.js gui.js /tmp/wurm_clean_code/
          
          # 2. Structure minimale exigée par le binaire Java
          mkdir -p template/app template/css template/data template/images template/markers template/dist template/includes
          cp /tmp/wurm_clean_code/index.html template/index.html
          
          # 3. Modification dynamique de l'hôte et injection forcée du port 5606 et du mot de passe (Orthographe ajustée)
          if [ -f "WurmMapGen.properties" ]; then
            sed -i 's/rmiHost=.*/rmiHost=${{ secrets.LEGION_HOST }}/g' WurmMapGen.properties
            sed -i 's/rmiPort=.*/rmiPort=5606/g' WurmMapGen.properties
            echo "rmiPassword=${{ secrets.RMI_PASSEWORD }}" >> WurmMapGen.properties
          fi
          
          # 4. Exécution du générateur WurmMapGen (avec connexion RMI active)
          java -Djava.awt.headless=true -Xmx5g -jar WurmMapGen.jar
          
          # 5. Restauration du code d'affichage propre
          cp -f /tmp/wurm_clean_code/index.html ./index.html
          cp -f /tmp/wurm_clean_code/main.js ./main.js
          cp -f /tmp/wurm_clean_code/map.js ./map.js
          cp -f /tmp/wurm_clean_code/gui.js ./gui.js
          
          # 6. Tri strict des scripts JSON dans data/
          if [ -d "data" ]; then
            find data/ -type f ! -name "*.json" -delete
          fi
          
          # 7. FORCE-PATCH : Réparation de la virgule orpheline de la v2.33 dans markers.js
          if [ -f "markers.js" ]; then
            sed -i 's/iconSize:[[:space:]]*,/iconSize:,/g' markers.js
            sed -i 's/iconAnchor:[[:space:]]*,/iconAnchor:,/g' markers.js
          fi

          # 8. Nettoyage complet avant l'envoi sur GitHub Pages
          rm -rf sqlite/
          rm -f top_layer.map
          rm -rf template/
          rm -rf app/
          rm -f data/*.php

      - name: 5. Creation et televersement de l'artefact Web
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 6. Deploiement en ligne sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4


