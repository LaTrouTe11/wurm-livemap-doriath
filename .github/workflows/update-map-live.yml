name: Synchro Carte Wurm Legion Hosting

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4

      - name: 2. Installation
        run: sudo apt-get update && sudo apt-get install -y lftp openjdk-17-jre

      - name: 3. Telechargement donnees
        run: |
          mkdir -p ./sqlite
          lftp -u "${{ secrets.LEGION_USER }},${{ secrets.LEGION_PASS }}" sftp://${{ secrets.LEGION_HOST }}:${{ secrets.LEGION_PORT }} <<EOF
          set sftp:auto-confirm yes
          set ssl:verify-certificate no
          cd /dist/Doriath-4k-20/sqlite/
          mget -O ./sqlite/ wurmzones.db wurmitems.db wurmplayers.db
          cd ../
          get -O . top_layer.map
          bye
          EOF

      - name: 4. Generation
        run: |
          # Génération de la carte (le .jar est à la racine)
          java -Djava.awt.headless=true -Xmx5g -jar WurmMapGen.jar
          
          # Copie des tuiles générées vers le dossier de votre site
          mkdir -p template/tiles
          cp -r tiles/* template/tiles/
          
          # Nettoyage des fichiers temporaires
          rm -rf tiles/
          rm -f top_layer.map
          # Optionnel : rm -rf sqlite/ (si vous ne voulez pas garder les DB dans le repo)

      - name: 5. Push final
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Ajout des modifications dans le dossier template
          git add template/ || echo "Aucun changement"
          git commit -m "MAJ AUTO : Synchronisation des tuiles et mise à jour web" || echo "Rien à commiter"
          git push origin main
