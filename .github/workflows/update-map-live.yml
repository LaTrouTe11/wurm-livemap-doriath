name: Synchro Carte Wurm Legion Hosting

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4

      - name: 2. Installation
        run: sudo apt-get update && sudo apt-get install -y lftp openjdk-17-jre

      - name: 3. Telechargement des donnees
        run: |
          mkdir -p ./sqlite
          lftp -u ${{ secrets.LEGION_USER }},${{ secrets.LEGION_PASS }} sftp://${{ secrets.LEGION_HOST }}:${{ secrets.LEGION_PORT }} <<EOF
          set sftp:auto-confirm yes
          set ssl:verify-certificate no
          cd /dist/Doriath-4k-20/sqlite/
          mget wurmzones.db wurmitems.db wurmplayers.db
          cd ../
          get top_layer.map
          bye
          EOF
          mv wurmzones.db wurmitems.db wurmplayers.db ./sqlite/

      - name: 4. Execution et Conversion
        run: |
          # Création forcée du config.json indispensable au main.js
          mkdir -p data
          echo '{"actualMapSize":4096,"mapTileSize":256,"mapMaxZoom":5,"mapMinZoom":0,"nativeZoom":5,"markerType":2}' > data/config.json
          
          # Configuration du générateur
          cat <<EOF > WurmMapGen.properties
          serverName=[QC/FR/CAN] QBC Doriath
          wurmMapLocation=.
          saveLocation=.
          dbDir=./sqlite/
          zonesDb=wurmzones.db
          itemsDb=wurmitems.db
          playersDb=wurmplayers.db
          actualMapSize=4096
          mapTileSize=256
          mapMaxZoom=5
          mapMinZoom=0
          nativeZoom=5
          markerType=2
          enableRealtimeMarkers=false
          EOF

          # Lancement du générateur
          java -Djava.awt.headless=true -Xmx6g -jar WurmMapGen.jar || true
          
          # Conversion des .php en .json
          for f in data/*.php; do [ -e "$f" ] && mv "$f" "${f%.php}.json"; done || true

      - name: 4c. Copie vers template
        run: |
          mkdir -p template/data
          cp data/*.json template/data/ || true

      - name: 5. Synchronisation Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # On ajoute tout le dossier data et template/data
          git add data/
          git add template/data/
          
          if ! git diff --cached --quiet; then
            git commit -m "MAJ auto : donnees et synchronisation template"
            git push origin main
          fi
