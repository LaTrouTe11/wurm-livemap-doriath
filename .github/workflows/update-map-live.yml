name: Synchro Carte Wurm Legion Hosting

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4

      - name: 2. Installation
        run: sudo apt-get update && sudo apt-get install -y lftp openjdk-17-jre

      - name: 3. Generation
        run: |
          mkdir -p WurmGenMap/sqlite
          # (Ajoutez ici vos commandes lftp si besoin)
          java -Djava.awt.headless=true -Xmx5g -jar WurmGenMap/WurmMapGen.jar
          mkdir -p tiles
          find . -maxdepth 1 \( -name "*.png" -o -name "*.json" \) -exec mv {} tiles/ \; || echo "Aucune tuile"
          if [ -f config.json ]; then cp config.json template/data/config.json; fi

      - name: 4. Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './template' # Publie uniquement le dossier template

      - name: 5. Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
