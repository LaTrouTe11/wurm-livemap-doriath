name: Synchro Carte Wurm Legion Hosting

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout du depot
        uses: actions/checkout@v3

      - name: 2. Installation dependances
        run: sudo apt-get update && sudo apt-get install -y lftp openjdk-17-jre

      - name: 3. Telechargement des donnees
        run: |
          lftp -c "open -u ${{ secrets.FTP_USER }},${{ secrets.FTP_PASS }} ${{ secrets.FTP_HOST }}; get -O . w_map.db"

      - name: 4. Execution WurmMapGen
        run: |
          java -jar WurmMapGen.jar -map w_map.db -out .
          # Mise a jour de la date dans le template
          sed -i "s|{{date_compil}}|$(date +'%Y-%m-%d %H:%M:%S')|g" index.html

      - name: 5. Generation du rapport
        run: |
          echo "Rapport de generation - Doriath 4K" > generation_report.txt
          echo "Date : $(date +'%Y-%m-%d %H:%M:%S')" >> generation_report.txt
          echo "-----------------------------------" >> generation_report.txt
          echo "Etat de la generation : Succès" >> generation_report.txt
          echo "Fichiers generes :" >> generation_report.txt
          ls -lh *.map >> generation_report.txt

      - name: 6. Envoi au depot
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Ajout des fichiers modifies
          git add index.html generation_report.txt data/ images/ || true
          
          # Commit et push seulement s'il y a des changements
          if ! git diff --cached --quiet; then
            git commit -m "Mise a jour auto: carte et rapport de generation"
            git push origin main
          else
            echo "Aucun changement detecte."
          fi
