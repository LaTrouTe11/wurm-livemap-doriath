- name: 4. Execution et Conversion
        run: |
          # 1. Vérification des fichiers
          echo "Vérification des fichiers..."
          ls -lh ./sqlite/
          ls -lh top_layer.map
          
          # 2. Création propre du fichier properties
          cat <<EOF > WurmMapGen.properties
          serverName=[QC/FR/CAN] QBC Doriath |PVE | MODS 8 K 2025
          wurmMapLocation=.
          saveLocation=.
          dbDir=./sqlite/
          zonesDb=wurmzones.db
          itemsDb=wurmitems.db
          playersDb=wurmplayers.db
          enableRealtimeMarkers=false
          rmiHost=localhost
          rmiPort=8080
          mapTileSize=256
          actualMapSize=4096
          mapMaxZoom=5
          EOF

          # 3. Lancement du robot
          echo "Lancement du robot..."
          java -Djava.awt.headless=true -Xmx6g -jar WurmMapGen.jar
          
          # 4. Conversion et nettoyage
          rm -f config.php
          for f in data/*.php; do [ -e "\$f" ] && mv "\$f" "\${f%.php}.json"; done
          sed -i "s|MAJ_DATE_ICI|$(date +'%Y-%m-%d %H:%M:%S')|g" index.html
