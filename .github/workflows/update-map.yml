name: "Mise a jour Carte Doriath"

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }} # Donne l'autorisation d'écrire dans vos fichiers

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Création des structures de dossiers requises
      - name: Create local directories
        run: mkdir -p sqlite_db/sqlite

      # Scan complet et téléchargement automatique des fichiers Wurm
      - name: Scan and Download Map Files via Node SFTP
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            const execSync = require('child_process').execSync;
            execSync('npm install ssh2-sftp-client');
            const Client = require('ssh2-sftp-client');
            const sftp = new Client();
            
            const config = {
              host: '${{ secrets.LEGION_HOST }}',
              port: parseInt('${{ secrets.LEGION_PORT }}' || '22'),
              username: '${{ secrets.LEGION_USER }}',
              password: '${{ secrets.LEGION_PASS }}'
            };
            
            async function findFile(dir, targetName) {
              let list = await sftp.list(dir);
              for (const item of list) {
                const fullPath = dir === '/' ? `/${item.name}` : `${dir}/${item.name}`;
                if (item.type === '-') {
                  if (item.name.toLowerCase() === targetName.toLowerCase()) {
                    return fullPath;
                  }
                } else if (item.type === 'd' && item.name !== '.' && item.name !== '..') {
                  try {
                    const found = await findFile(fullPath, targetName);
                    if (found) return found;
                  } catch (e) {}
                }
              }
              return null;
            }
            
            async function main() {
              try {
                console.log('Connexion à Legion Hosting...');
                await sftp.connect(config);
                
                const mapPath = await findFile('.', 'top_layer.map');
                if (mapPath) { await sftp.fastGet(mapPath, './sqlite_db/top_layer.map'); }
                
                const zonesPath = await findFile('.', 'wurmzones.db');
                if (zonesPath) { await sftp.fastGet(zonesPath, './sqlite_db/sqlite/wurmzones.db'); }

                const itemsPath = await findFile('.', 'wurmitems.db');
                if (itemsPath) { await sftp.fastGet(itemsPath, './sqlite_db/sqlite/wurmitems.db'); }

                const playersPath = await findFile('.', 'wurmplayers.db');
                if (playersPath) { await sftp.fastGet(playersPath, './sqlite_db/sqlite/wurmplayers.db'); }
                
                console.log('Téléchargements réussis.');
              } catch (err) {
                console.error('Erreur critique:', err.message);
                process.exit(1);
              } finally {
                await sftp.end();
              }
            }
            
            return main();

      # Alignement structurel complet
      - name: Align files structure
        run: |
          cp ./sqlite_db/top_layer.map ./sqlite_db/sqlite/top_layer.map
          cp ./sqlite_db/sqlite/wurmzones.db ./sqlite_db/wurmzones.db
          cp ./sqlite_db/sqlite/wurmitems.db ./sqlite_db/wurmitems.db
          cp ./sqlite_db/sqlite/wurmplayers.db ./sqlite_db/wurmplayers.db
          echo "Structure de données alignée."

      # Compilation de la carte et correction de l'index de la racine
      - name: Run WurmMapGen
        run: |
          java -jar WurmMapGen.jar

      # ÉTAPE CRITIQUE : Le robot crée un rapport et pousse l'index corrigé sur votre dépôt GitHub réel
      - name: Pousser les fichiers corriges sur GitHub
        run: |
          git config --global user.name "Doriath-Map-Bot"
          git config --global user.email "actions@github.com"
          
          # Crée un petit fichier texte pour prouver la réussite de la génération
          echo "Dernière compilation réussie le $(date '+%Y-%m-%d a %H:%M:%S')" > generation_report.txt
          
          # Force l'ajout du index.html modifié par Java et du rapport de texte
          git add index.html generation_report.txt
          
          # Vérifie s'il y a des changements avant de sauvegarder pour éviter de faire planter le script
          if ! git diff-index --quiet HEAD --; then
            git commit -m "Mise a jour automatique WurmMapGen [skip ci]"
            git push origin main
            echo "Succès : L'index.html a été mis à jour directement dans vos fichiers GitHub !"
          else
            echo "Aucun changement détecté dans l'index.html."
          fi

      # Préparation du site pour la mise en ligne
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      # Déploiement final en ligne
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4







