name: Synchro Carte Wurm Legion Hosting

on:
  schedule:
    - cron: '0 4 * * *' # Étape automatique : S'exécute toutes les nuits à 4h00 UTC
  workflow_dispatch: # Étape manuelle : Ajoute le bouton gris pour forcer la mise à jour

permissions:
  contents: write # Force l'autorisation d'écriture sur votre dépôt GitHub

jobs:
  sync-map:
    runs-on: ubuntu-latest
    steps:
    - name: 1. Connexion au dépôt GitHub
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    - name: 2. Telechargement direct des fichiers JSON (SFTP Port 2022)
      run: |
        sudo apt-get update && sudo apt-get install -y lftp
        mkdir -p ~/.lftp && echo "set sftp:auto-confirm yes; set ssl:verify-certificate false;" > ~/.lftp/rc
        
        # Connexion sécurisée à Legion Hosting et téléchargement des JSON dans votre dossier data
        lftp -u "${{ secrets.LEGION_USER }},${{ secrets.LEGION_PASS }}" sftp://${{ secrets.LEGION_HOST }}:${{ secrets.LEGION_PORT }} -e "
          lcd ./data;
          mget -O ./ *.json;
          bye
        "

    - name: 3. Sauvegarde et Envoi automatique sur GitHub
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@://github.com"
        
        # Prise en compte de tous les fichiers JSON mis à jour (villages.json, structures.json, etc.)
        git add data/*.json
        
        # Enregistre le changement. S'il n'y a aucune modification, le script s'arrête proprement sans erreur ([skip ci] évite les boucles Vercel)
        git commit -m "Mise à jour automatique des données de la carte [skip ci]" || exit 0
        git push origin main

