name: Synchro Carte Wurm Legion Hosting (WurmMapGen v2.33)

on:
  schedule:
    - cron: '0 4 * * *' # S'exécute automatiquement toutes les nuits à 4h00 UTC (Minuit pile au Québec)
  workflow_dispatch: # Ajoute le bouton gris pour tester manuellement à n'importe quelle heure

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write # Donne le droit à GitHub de modifier vos dossiers data/ et images/

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: 1. Connexion au depot GitHub
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    - name: 2. Installation de Java 17 et de lftp
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17' # Version stable idéale pour faire tourner WurmMapGen.jar
    - name: Installer lftp
      run: |
        sudo apt-get update && sudo apt-get install -y lftp
        mkdir -p ~/.lftp && echo "set sftp:auto-confirm yes; set ssl:verify-certificate false;" > ~/.lftp/rc

    - name: 3. Telechargement des bases de donnees (.db) depuis Legion Hosting
      run: |
        # Crée le dossier temporaire pour recevoir les bases de données du jeu
        mkdir -p ./sqlite_db
        
        # Connexion SFTP (Port 2022) et récupération des fichiers essentiels
        lftp -u "${{ secrets.LEGION_USER }},${{ secrets.LEGION_PASS }}" sftp://${{ secrets.LEGION_HOST }}:${{ secrets.LEGION_PORT }} -e "
          cd /; # <--- IMPORTANT : Remplacez / par le chemin de votre dossier de jeu si nécessaire
          mget -O ./sqlite_db wurmzones.db wurmeconomy.db;
          bye
        " || true

    - name: 4. Execution de WurmMapGen v2.33
      run: |
        # Lance la génération de la carte en allouant 3 Go de RAM virtuelle
        # Le programme va lire ./sqlite_db/ et mettre à jour les dossiers data/ et images/
        java -Xmx3g -jar WurmMapGen.jar

    - name: 5. Generation de la date et heure locale (Quebec)
      run: |
        # Crée le fichier de synchronisation pour l'affichage web
        TZ="America/Toronto" date +'{"last_update": "%d/%m/%Y a %H:%M"}' > data/timestamp.json

    - name: 6. Sauvegarde et Envoi automatique des changements vers Vercel
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@://github.com"
        
        # Sélectionne les fichiers JSON mis à jour et les nouvelles tuiles d'images
        git add data/*.json || true
        git add images/ || true
        git add tiles/ || true  # Inclus au cas où votre dossier d'images s'appelle tiles
        
        # Enregistre les modifications. Si rien n'a changé, s'arrête proprement sans erreur.
        git commit -m "Mise a jour automatique WurmMapGen v2.33 [skip ci]" || exit 0
        git push origin main



