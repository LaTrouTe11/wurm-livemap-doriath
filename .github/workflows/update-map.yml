name: "Mise a jour Carte Doriath"

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Création propre du dossier local de réception
      - name: Create local directories
        run: mkdir -p sqlite_db

      # Scan complet et téléchargement automatique du fichier
      - name: Scan and Download Map via Node SFTP
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            // Installation de la bibliothèque SFTP
            const execSync = require('child_process').execSync;
            execSync('npm install ssh2-sftp-client');
            const Client = require('ssh2-sftp-client');
            const sftp = new Client();
            
            const config = {
              host: '${{ secrets.LEGION_HOST }}',
              port: parseInt('${{ secrets.LEGION_PORT }}' || '22'),
              username: '${{ secrets.LEGION_USER }}',
              password: '${{ secrets.LEGION_PASS }}'
            };
            
            // Fonction récursive pour chercher le fichier partout sur le serveur
            async function findFile(dir, targetName) {
              console.log(`Recherche dans le dossier : ${dir}`);
              let list = await sftp.list(dir);
              for (const item of list) {
                const fullPath = dir === '/' ? `/${item.name}` : `${dir}/${item.name}`;
                if (item.type === '-') {
                  if (item.name.toLowerCase() === targetName.toLowerCase()) {
                    return fullPath;
                  }
                } else if (item.type === 'd' && item.name !== '.' && item.name !== '..') {
                  try {
                    const found = await findFile(fullPath, targetName);
                    if (found) return found;
                  } catch (e) {
                    // Ignore les dossiers système inaccessibles
                  }
                }
              }
              return null;
            }
            
            async function main() {
              try {
                console.log('Connexion à Legion Hosting...');
                await sftp.connect(config);
                console.log('Connexion établie. Lancement de la recherche automatique du fichier...');
                
                // Démarre la recherche à la racine visible du SFTP
                const remotePath = await findFile('.', 'top_layer.map');
                
                if (!remotePath) {
                  throw new Error('Le fichier top_layer.map est introuvable sur votre serveur Legion Hosting.');
                }
                
                console.log(`Fichier localisé à l'emplacement exact : ${remotePath}`);
                console.log('Téléchargement en cours...');
                await sftp.fastGet(remotePath, './sqlite_db/top_layer.map');
                console.log('Téléchargement terminé avec succès !');
                
              } catch (err) {
                console.error('Erreur critique:', err.message);
                process.exit(1);
              } finally {
                await sftp.end();
              }
            }
            
            return main();

      # Vérification stricte du fichier avant de lancer WurmMapGen
      - name: Verify file position
        run: |
          if [ -s "./sqlite_db/top_layer.map" ]; then
            echo "Succès absolu : Le fichier top_layer.map est prêt."
          else
            echo "Erreur : Le fichier est absent ou vide."
            exit 1
          fi

      # Compilation de la carte et correction automatique de l'index racine
      - name: Run WurmMapGen
        run: |
          java -jar WurmMapGen.jar WurmMapGen.properties

      # Préparation du site
      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      # Déploiement final en ligne
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4






