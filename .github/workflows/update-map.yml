name: Synchro Carte Wurm Legion Hosting (WurmMapGen v2.33)

on:
  schedule:
    - cron: '0 4 * * *' # Planification : Toutes les nuits a minuit au Quebec (4h00 UTC)
  workflow_dispatch: # Manuel : Permet de cliquer sur le bouton gris pour tester

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: 1. Connexion au depot GitHub
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    - name: 2. Installation de Java et lftp
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Installer lftp
      run: |
        sudo apt-get update && sudo apt-get install -y lftp
        mkdir -p ~/.lftp && echo "set sftp:auto-confirm yes; set ssl:verify-certificate false;" > ~/.lftp/rc

    - name: 3. Telechargement des bases de donnees Wurm
      run: |
        mkdir -p ./sqlite_db
        mkdir -p ./sqlite_db/sqlite
        lftp -u "${{ secrets.LEGION_USER }},${{ secrets.LEGION_PASS }}" sftp://${{ secrets.LEGION_HOST }}:${{ secrets.LEGION_PORT }} -e "
          get /dist/Doriath-4k-20/sqlite/wurmzones.db -o ./sqlite_db/sqlite/wurmzones.db;
          get /dist/Doriath-4k-20/sqlite/wurmeconomy.db -o ./sqlite_db/sqlite/wurmeconomy.db;
          get /dist/Doriath-4k-20/sqlite/wurmitems.db -o ./sqlite_db/sqlite/wurmitems.db;
          get /dist/Doriath-4k-20/sqlite/wurmplayers.db -o ./sqlite_db/sqlite/wurmplayers.db;
          get /dist/Doriath-4k-20/top_layer.map -o ./sqlite_db/top_layer.map;
          bye
        " || echo "⚠️ Fin du téléchargement FTP."

    - name: 3.5 Miroir de securite pour la topographie
      run: |
        cp ./sqlite_db/top_layer.map ./sqlite_db/sqlite/top_layer.map 2>/dev/null || true

    - name: 4. Execution de WurmMapGen v2.33
      run: |
        java -Djava.awt.headless=true -Xmx3g -jar WurmMapGen.jar

    - name: 4.5 Configuration Automatique pour Leaflet
      run: |
        rm -f ./config.json || true
        mkdir -p ./data
        
        # Genere un fichier config JSON impeccable que le site d'origine va adorer lire pour la taille 4096
        echo '{"config":{"actualMapSize":4096,"showStructures":true,"nativeZoom":4,"mapMinZoom":2,"showGuardTowers":true,"mapMaxZoom":7,"mapTileSize":256,"showDeeds":true,"maxMapSize":32768,"markerType":2}}' > ./data/config.json
        
        # Aligne vos fichiers reels genere par la v2.33 avec les demandes de l'index d'origine
        if [ -f "./data/deeds.json" ]; then
          cp ./data/deeds.json ./data/villages.json 2>/dev/null || true
        else
          echo "[]" > ./data/villages.json
          echo "[]" > ./data/deeds.json
        fi
        
        if [ -f "./data/towers.json" ]; then
          cp ./data/towers.json ./data/guardtowers.json 2>/dev/null || true
        else
          echo "[]" > ./data/guardtowers.json
          echo "[]" > ./data/towers.json
        fi

    - name: 5. Sauvegarde et Envoi automatique force vers Vercel et GitHub Pages
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@://github.com"
        
        # Force la recuperation de l'historique distant pour eviter les conflits de push
        git pull origin main --rebase || true
        
        git add data/*.json || true
        git add *.json || true
        git add images/ || true
        git add tiles/ || true
        
        git commit -m "Mise a jour automatique WurmMapGen v2.33 [skip ci]" || exit 0
        
        # Envoi force pour outrepasser les blocages d'historique de jetons
        git push origin main --force





