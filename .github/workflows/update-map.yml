name: "Mise a jour Carte Doriath"

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Création du dossier local requis par WurmMapGen
      - name: Create local directories
        run: mkdir -p sqlite_db

      # Téléchargement natif par SFTP en utilisant vos EXACTS secrets de Legion Hosting
      - name: Download Map via SFTP
        run: |
          sudo apt-get update && sudo apt-get install -y sshpass
          export SSHPASS="${{ secrets.LEGION_PASS }}"
          sshpass -e sftp -o StrictHostKeyChecking=no -P ${{ secrets.LEGION_PORT }} ${{ secrets.LEGION_USER }}@${{ secrets.LEGION_HOST }} <<EOF
          get /home/container/dist/Doriath-4k-20/sqlite/top_layer.map ./sqlite_db/top_layer.map
          quit
          EOF

      # Vérification de sécurité pour s'assurer que le fichier est bien arrivé
      - name: Verify file position
        run: |
          if [ -f "./sqlite_db/top_layer.map" ]; then
            echo "Succès : Le fichier top_layer.map a été récupéré de Legion Hosting."
          else
            echo "Erreur : Le fichier n'a pas pu être téléchargé."
            exit 1
          fi

      # Compilation de la carte et mise à jour automatique de l'index racine
      - name: Run WurmMapGen
        run: |
          java -jar WurmMapGen.jar WurmMapGen.properties

      # Préparation du site corrigé
      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      # Déploiement final en ligne
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4




