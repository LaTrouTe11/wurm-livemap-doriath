name: "Mise a jour Carte Doriath"

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Création propre du dossier local de réception
      - name: Create local directories
        run: mkdir -p sqlite_db

      # Téléchargement sécurisé et forcé avec CURL (Spécifique Legion Hosting / Pterodactyl)
      - name: Download Map via Curl SFTP
        run: |
          curl -k --user "${{ secrets.LEGION_USER }}:${{ secrets.LEGION_PASS }}" \
            "sftp://${{ secrets.LEGION_HOST }}:${{ secrets.LEGION_PORT }}/dist/Doriath-4k-20/sqlite/top_layer.map" \
            -o ./sqlite_db/top_layer.map

      # Vérification stricte du fichier avant de lancer l'application Java
      - name: Verify file position
        run: |
          if [ -s "./sqlite_db/top_layer.map" ]; then
            echo "Succès total : Le fichier top_layer.map est valide et pèse $(du -sh ./sqlite_db/top_layer.map | cut -f1)."
          else
            echo "Échec critique : Le fichier n'a pas pu être récupéré ou est vide."
            exit 1
          fi

      # Compilation de la carte et correction de l'index de la racine
      - name: Run WurmMapGen
        run: |
          java -jar WurmMapGen.jar WurmMapGen.properties

      # Préparation du site
      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      # Déploiement en ligne
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4






