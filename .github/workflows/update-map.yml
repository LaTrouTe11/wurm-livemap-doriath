name: Synchro Carte Wurm Legion Hosting

on:
  schedule:
    - cron: '0 4 * * *' # Étape automatique : S'exécute toutes les nuits à 4h00 UTC
  workflow_dispatch: # Étape manuelle : Ajoute le bouton gris pour forcer la mise à jour

permissions:
  contents: write # Donne le droit à GitHub de modifier et sauvegarder vos fichiers JSON

jobs:
  sync-map:
    runs-on: ubuntu-latest
    steps:
    - name: 1. Connexion au dépôt GitHub
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    - name: 2. Telechargement des fichiers JSON de la carte (SFTP Port 2022)
      run: |
        # Installation d'un outil de transfert rapide
        sudo apt-get update && sudo apt-get install -y lftp
        mkdir -p ~/.lftp && echo "set sftp:auto-confirm yes; set ssl:verify-certificate false;" > ~/.lftp/rc
        
        # Connexion sécurisée à votre serveur de jeu et téléchargement direct dans votre dossier data
        # Remplacez /wurmmapgen/output/ par le dossier exact où votre outil génère les fichiers sur votre serveur
        lftp -u "${{ secrets.LEGION_USER }},${{ secrets.LEGION_PASS }}" sftp://${{ secrets.LEGION_HOST }}:${{ secrets.LEGION_PORT }} -e "
          lcd ./data;
          mget -O ./ *.json;
          bye
        "

    - name: 3. Sauvegarde et Envoi automatique sur GitHub
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@://github.com"
        
        # Ajoute tous les fichiers JSON mis à jour (villages.json, structures.json, etc.)
        git add data/*.json
        
        # Enregistre les changements. S'il n'y a pas de changement, s'arrête proprement ([skip ci] évite les boucles)
        git commit -m "Mise à jour automatique des données de la carte [skip ci]" || exit 0
        git push origin main

