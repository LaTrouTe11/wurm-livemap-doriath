name: Synchro Carte Wurm Legion Hosting (WurmMapGen v2.33)

on:
  schedule:
    - cron: '0 4 * * *' # Planification : S'exécute automatiquement toutes les nuits à minuit au Québec (4h00 UTC)
  workflow_dispatch: # Manuel : Permet de cliquer sur le bouton gris pour tester à tout moment

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: 1. Connexion au depot GitHub
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    - name: 2. Installation de Java 17 et de lftp
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    - name: Installer lftp
      run: |
        sudo apt-get update && sudo apt-get install -y lftp
        mkdir -p ~/.lftp && echo "set sftp:auto-confirm yes; set ssl:verify-certificate false;" > ~/.lftp/rc

    - name: 3. Telechargement des bases de donnees et cartes depuis Legion Hosting
      run: |
        mkdir -p ./sqlite_db
        
        # Télécharge l'intégralité du dossier distant de manière récursive
        lftp -u "${{ secrets.LEGION_USER }},${{ secrets.LEGION_PASS }}" sftp://${{ secrets.LEGION_HOST }}:${{ secrets.LEGION_PORT }} -e "
          cd /dist/Doriath-4k-20;
          mirror --include=".*\.db$" --include=".*\.map$" ./sqlite_db;
          bye
        " || echo "⚠️ Attention : Fin de la commande de téléchargement."

    - name: 3.5 Extraction et Nettoyage des sous-dossiers
      run: |
        # Si lftp a créé un sous-dossier sqlite, on déplace tout son contenu à la racine de sqlite_db
        if [ -d "./sqlite_db/sqlite" ]; then
          mv ./sqlite_db/sqlite/* ./sqlite_db/ 2>/dev/null || true
          rm -rf ./sqlite_db/sqlite
        fi
        
        # Vérification visuelle dans la console des fichiers prêts pour Java
        echo "=== FICHIERS DANS SQLITE_DB ==="
        ls -la ./sqlite_db

    - name: 4. Execution de WurmMapGen v2.33
      run: |
        # Lance la génération de la carte en mode console sans écran graphique
        java -Djava.awt.headless=true -Xmx3g -jar WurmMapGen.jar

    - name: 5. Generation de la date et heure locale (Quebec)
      run: |
        mkdir -p data
        TZ="America/Toronto" date +'{"last_update": "%d/%m/%Y a %H:%M"}' > data/timestamp.json

    - name: 6. Sauvegarde et Envoi automatique vers Vercel
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@://github.com"
        
        # Enregistre tous les fichiers de données et d'images modifiés
        git add data/*.json || true
        git add *.json || true
        git add images/ || true
        git add tiles/ || true
        
        git commit -m "Mise a jour automatique WurmMapGen v2.33 [skip ci]" || exit 0
        git push origin main






