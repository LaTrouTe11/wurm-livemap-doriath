name: "Mise a jour Carte Doriath"

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Run WurmMapGen
        run: echo "Execution..."

      - name: Upload
        uses: actions/upload-artifact@v5
        with:
          name: github-pages
          path: '.'

      - name: Deploy
        uses: actions/deploy-pages@v5


