name: Synchro Carte Wurm Legion Hosting (WurmMapGen v2.33)

on:
  schedule:
    - cron: '0 4 * * *' # Planification : S'exécute automatiquement toutes les nuits à minuit au Québec (4h00 UTC)
  workflow_dispatch: # Manuel : Permet de cliquer sur le bouton gris pour tester à tout moment

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: 1. Connexion au depot GitHub
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    - name: 2. Installation de Java et lftp
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Installer lftp
      run: |
        sudo apt-get update && sudo apt-get install -y lftp
        mkdir -p ~/.lftp && echo "set sftp:auto-confirm yes; set ssl:verify-certificate false;" > ~/.lftp/rc

    - name: 3. Telechargement des bases de donnees Wurm
      run: |
        mkdir -p ./sqlite_db
        mkdir -p ./sqlite_db/sqlite
        lftp -u "${{ secrets.LEGION_USER }},${{ secrets.LEGION_PASS }}" sftp://${{ secrets.LEGION_HOST }}:${{ secrets.LEGION_PORT }} -e "
          get /dist/Doriath-4k-20/sqlite/wurmzones.db -o ./sqlite_db/sqlite/wurmzones.db;
          get /dist/Doriath-4k-20/sqlite/wurmeconomy.db -o ./sqlite_db/sqlite/wurmeconomy.db;
          get /dist/Doriath-4k-20/sqlite/wurmitems.db -o ./sqlite_db/sqlite/wurmitems.db;
          get /dist/Doriath-4k-20/sqlite/wurmplayers.db -o ./sqlite_db/sqlite/wurmplayers.db;
          get /dist/Doriath-4k-20/top_layer.map -o ./sqlite_db/top_layer.map;
          bye
        " || echo "⚠️ Fin du téléchargement FTP."

    - name: 3.5 Miroir de securite pour la topographie
      run: |
        cp ./sqlite_db/top_layer.map ./sqlite_db/sqlite/top_layer.map 2>/dev/null || true

    - name: 3.8 Telechargement local des scripts (Securite CORS)
      run: |
        # Crée et télécharge les dépendances directement en local pour s'affranchir des blocages réseau
        mkdir -p ./dist ./css
        curl -sL https://cloudflare.com -o ./dist/leaflet-local.js
        curl -sL https://cloudflare.com -o ./css/leaflet-local.css
        curl -sL https://cloudflare.com -o ./dist/vue-local.js

    - name: 4. Execution de WurmMapGen v2.33
      run: |
        java -Djava.awt.headless=true -Xmx3g -jar WurmMapGen.jar

    - name: 4.5 Nettoyage des fichiers de configuration generee
      run: |
        rm -f ./config.json || true
        rm -f ./data/config.json || true
        if [ -f "./data/villages.json" ]; then
          cp ./data/villages.json ./data/deeds.json 2>/dev/null || true
        fi
        if [ -f "./data/guardtowers.json" ]; then
          cp ./data/guardtowers.json ./data/towers.json 2>/dev/null || true
        fi

    - name: 5. Generation du rapport des modifications (Changelog)
      run: |
        mkdir -p data
        JSON_MODIFS=$(git status --porcelain *.json data/*.json | awk '{print $2}' | xargs -I {} basename {} | paste -sd ", " -)
        IMG_COUNT=$(git status --porcelain images/ tiles/ 2>/dev/null | grep -E '\.(jpg|png)$' | wc -l)
        if [ -z "$JSON_MODIFS" ]; then JSON_MODIFS="Aucun changement"; fi
        echo "{\"last_update\": \"$(TZ="America/Toronto" date +'%d/%m/%Y a %H:%M')\", \"fichiers\": \"$JSON_MODIFS\", \"images_neuves\": \"$IMG_COUNT tuiles\"}" > data/timestamp.json

    - name: 6. Sauvegarde et Envoi automatique vers Vercel
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@://github.com"
        git add data/*.json || true
        git add *.json || true
        git add dist/*.js || true
        git add css/*.css || true
        git add images/ || true
        git add tiles/ || true
        git commit -m "Mise a jour automatique WurmMapGen v2.33 [skip ci]" || exit 0
        git push origin main








