name: Synchro Carte Wurm Legion Hosting

on:
  schedule:
    - cron: '0 4 * * *' # Étape automatique : S'exécute toutes les nuits à 4h00 UTC
  workflow_dispatch: # Étape manuelle : Ajoute le bouton gris pour forcer la mise à jour

permissions:
  contents: write # Donne explicitement le droit à GitHub d'enregistrer vos fichiers JSON

jobs:
  download-json:
    runs-on: ubuntu-latest
    steps:
    - name: 1. Connexion au depot GitHub
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    - name: 2. Telechargement direct des fichiers de la carte (SFTP Port 2022)
      run: |
        sudo apt-get update && sudo apt-get install -y lftp
        mkdir -p ~/.lftp && echo "set sftp:auto-confirm yes; set ssl:verify-certificate false;" > ~/.lftp/rc
        
        # Connexion securisee a votre serveur Legion (Port 2022) et telechargement des fichiers
        # NOTE : Modifiez la ligne 'cd ...' ci-dessous avec le chemin exact de votre dossier sur FileZilla si necessaire !
        lftp -u "${{ secrets.LEGION_USER }},${{ secrets.LEGION_PASS }}" sftp://${{ secrets.LEGION_HOST }}:${{ secrets.LEGION_PORT }} -e "
          lcd ./data;
          cd /wurmmapgen/output/;
          mget -O ./ *.json;
          bye
        "

    - name: 3. Sauvegarde et Envoi automatique sur GitHub
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@://github.com"
        
        # Enregistre tous les fichiers JSON mis à jour dans votre dossier data
        git add data/*.json
        
        # Enregistre les fichiers s'il y a des changements, sinon s'arrete proprement ([skip ci] evite les boucles Vercel)
        git commit -m "Mise a jour automatique des fichiers de la carte [skip ci]" || exit 0
        git push origin main



