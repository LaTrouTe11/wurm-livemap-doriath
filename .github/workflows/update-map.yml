name: "Mise a jour Carte Doriath"

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Création des structures de dossiers requises
      - name: Create local directories
        run: mkdir -p sqlite_db/sqlite

      # Scan complet et téléchargement automatique de la liste complète des fichiers
      - name: Scan and Download Map Files via Node SFTP
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            const execSync = require('child_process').execSync;
            execSync('npm install ssh2-sftp-client');
            const Client = require('ssh2-sftp-client');
            const sftp = new Client();
            
            const config = {
              host: '${{ secrets.LEGION_HOST }}',
              port: parseInt('${{ secrets.LEGION_PORT }}' || '22'),
              username: '${{ secrets.LEGION_USER }}',
              password: '${{ secrets.LEGION_PASS }}'
            };
            
            async function findFile(dir, targetName) {
              let list = await sftp.list(dir);
              for (const item of list) {
                const fullPath = dir === '/' ? `/${item.name}` : `${dir}/${item.name}`;
                if (item.type === '-') {
                  if (item.name.toLowerCase() === targetName.toLowerCase()) {
                    return fullPath;
                  }
                } else if (item.type === 'd' && item.name !== '.' && item.name !== '..') {
                  try {
                    const found = await findFile(fullPath, targetName);
                    if (found) return found;
                  } catch (e) {}
                }
              }
              return null;
            }
            
            async function main() {
              try {
                console.log('Connexion à Legion Hosting...');
                await sftp.connect(config);
                
                // 1. top_layer.map
                const mapPath = await findFile('.', 'top_layer.map');
                if (mapPath) {
                  await sftp.fastGet(mapPath, './sqlite_db/top_layer.map');
                } else { throw new Error('top_layer.map introuvable.'); }
                
                // 2. wurmzones.db
                const zonesPath = await findFile('.', 'wurmzones.db');
                if (zonesPath) {
                  await sftp.fastGet(zonesPath, './sqlite_db/sqlite/wurmzones.db');
                } else { throw new Error('wurmzones.db introuvable.'); }

                // 3. wurmitems.db
                const itemsPath = await findFile('.', 'wurmitems.db');
                if (itemsPath) {
                  await sftp.fastGet(itemsPath, './sqlite_db/sqlite/wurmitems.db');
                } else { throw new Error('wurmitems.db introuvable.'); }

                // 4. wurmplayers.db
                const playersPath = await findFile('.', 'wurmplayers.db');
                if (playersPath) {
                  await sftp.fastGet(playersPath, './sqlite_db/sqlite/wurmplayers.db');
                  console.log('wurmplayers.db téléchargé.');
                } else { throw new Error('wurmplayers.db introuvable.'); }

                // 5. Optionnel : wurmhistory.db (Sécurité pour éviter un autre crash)
                const historyPath = await findFile('.', 'wurmhistory.db');
                if (historyPath) {
                  await sftp.fastGet(historyPath, './sqlite_db/sqlite/wurmhistory.db');
                }
                
                console.log('Tous les fichiers requis ont été rapatriés !');
              } catch (err) {
                console.error('Erreur critique:', err.message);
                process.exit(1);
              } finally {
                await sftp.end();
              }
            }
            
            return main();

      # Alignement structurel complet
      - name: Align files structure
        run: |
          cp ./sqlite_db/top_layer.map ./sqlite_db/sqlite/top_layer.map
          cp ./sqlite_db/sqlite/wurmzones.db ./sqlite_db/wurmzones.db
          cp ./sqlite_db/sqlite/wurmitems.db ./sqlite_db/wurmitems.db
          cp ./sqlite_db/sqlite/wurmplayers.db ./sqlite_db/wurmplayers.db
          if [ -f "./sqlite_db/sqlite/wurmhistory.db" ]; then cp ./sqlite_db/sqlite/wurmhistory.db ./sqlite_db/wurmhistory.db; fi
          echo "Structure de données synchronisée et alignée."

      # Compilation et mise à jour de l'index de la racine
      - name: Run WurmMapGen
        run: |
          java -jar WurmMapGen.jar

      # Préparation du site
      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      # Déploiement final en ligne
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4






