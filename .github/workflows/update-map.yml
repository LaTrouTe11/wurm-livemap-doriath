name: Synchro Carte Wurm Legion Hosting

on:
  schedule:
    - cron: '0 4 * * *' # Étape automatique : S'exécute toutes les nuits à 4h00 UTC
  workflow_dispatch: # Étape manuelle : Ajoute le bouton gris pour forcer la mise à jour

permissions:
  contents: write # Autorise GitHub à enregistrer vos fichiers de données

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
    - name: 1. Connexion au dépôt GitHub
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    - name: 2. Telechargement des fichiers JSON (SFTP Port 2022)
      run: |
        sudo apt-get update && sudo apt-get install -y lftp
        mkdir -p ~/.lftp && echo "set sftp:auto-confirm yes; set ssl:verify-certificate false;" > ~/.lftp/rc
        
        # Télécharge tous les fichiers .json directement depuis votre serveur Legion Hosting
        # Note : Si vos fichiers sont dans un sous-dossier, ajoutez 'cd nom_du_dossier;' juste après lcd ./data;
        lftp -u "${{ secrets.LEGION_USER }},${{ secrets.LEGION_PASS }}" sftp://${{ secrets.LEGION_HOST }}:${{ secrets.LEGION_PORT }} -e "
          lcd ./data;
          mget -O ./ *.json;
          bye
        "

    - name: 3. Sauvegarde et Envoi automatique sur GitHub
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@://github.com"
        
        # Enregistre tous les fichiers JSON mis à jour dans votre dossier data
        git add data/*.json
        
        # Valide les changements s'il y en a, sinon s'arrête proprement sans erreur
        git commit -m "Mise à jour des villages [skip ci]" || exit 0
        git push origin main


