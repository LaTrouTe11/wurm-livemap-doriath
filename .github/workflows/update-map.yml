name: Synchro Carte Wurm Legion Hosting (WurmMapGen v2.33)

on:
  schedule:
    - cron: '0 4 * * *' # Planification : S'exécute automatiquement toutes les nuits à minuit au Québec (4h00 UTC)
  workflow_dispatch: # Manuel : Permet de cliquer sur le bouton gris pour tester à tout moment

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write # Autorisation stricte pour que GitHub puisse enregistrer vos fichiers

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: 1. Connexion au depot GitHub
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    - name: 2. Installation de Java 17 et de lftp
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17' # Version d'exécution recommandée pour WurmMapGen
    - name: Installer lftp
      run: |
        sudo apt-get update && sudo apt-get install -y lftp
        mkdir -p ~/.lftp && echo "set sftp:auto-confirm yes; set ssl:verify-certificate false;" > ~/.lftp/rc

    - name: 3. Telechargement des bases de donnees (.db) depuis Legion Hosting
      run: |
        mkdir -p ./sqlite_db
        # Connexion SFTP tolérante (si la récupération échoue, affiche un message clair sans bloquer brusquement)
        lftp -u "${{ secrets.LEGION_USER }},${{ secrets.LEGION_PASS }}" sftp://${{ secrets.LEGION_HOST }}:${{ secrets.LEGION_PORT }} -e "
          mget -O ./sqlite_db wurmzones.db wurmeconomy.db;
          bye
        " || echo "⚠️ Attention : Fichiers .db non trouvés à la racine, poursuite du script..."

    - name: 4. Execution de WurmMapGen v2.33
      run: |
        # Force Java à s'exécuter en mode console pure (Headless) sans chercher d'écran graphique virtuel
        java -Djava.awt.headless=true -Xmx3g -jar WurmMapGen.jar

    - name: 5. Generation de la date et heure locale (Quebec)
      run: |
        # Inscrit le timestamp exact de la synchronisation dans votre dossier data
        TZ="America/Toronto" date +'{"last_update": "%d/%m/%Y a %H:%M"}' > data/timestamp.json

    - name: 6. Sauvegarde et Envoi automatique des changements vers Vercel
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@://github.com"
        
        # Prépare l'envoi des nouveaux fichiers JSON et des tuiles de la carte actualisées
        git add data/*.json || true
        git add images/ || true
        git add tiles/ || true
        
        # Enregistre le commit. Si aucune image ou coordonnée n'a changé, s'arrête proprement.
        git commit -m "Mise a jour automatique WurmMapGen v2.33 [skip ci]" || exit 0
        git push origin main




