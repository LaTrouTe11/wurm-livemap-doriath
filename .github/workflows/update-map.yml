name: "Mise a jour Carte Doriath"

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Création de l'arborescence exacte demandée par votre fichier properties
      - name: Create local directories
        run: mkdir -p sqlite_db/sqlite

      # Scan complet et téléchargement automatique de TOUS les fichiers requis
      - name: Scan and Download Map Files via Node SFTP
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            // Installation de la bibliothèque SFTP
            const execSync = require('child_process').execSync;
            execSync('npm install ssh2-sftp-client');
            const Client = require('ssh2-sftp-client');
            const sftp = new Client();
            
            const config = {
              host: '${{ secrets.LEGION_HOST }}',
              port: parseInt('${{ secrets.LEGION_PORT }}' || '22'),
              username: '${{ secrets.LEGION_USER }}',
              password: '${{ secrets.LEGION_PASS }}'
            };
            
            // Fonction récursive pour chercher les fichiers requis partout sur le serveur
            async function findFile(dir, targetName) {
              let list = await sftp.list(dir);
              for (const item of list) {
                const fullPath = dir === '/' ? `/${item.name}` : `${dir}/${item.name}`;
                if (item.type === '-') {
                  if (item.name.toLowerCase() === targetName.toLowerCase()) {
                    return fullPath;
                  }
                } else if (item.type === 'd' && item.name !== '.' && item.name !== '..') {
                  try {
                    const found = await findFile(fullPath, targetName);
                    if (found) return found;
                  } catch (e) {
                    // Ignore les dossiers système inaccessibles
                  }
                }
              }
              return null;
            }
            
            async function main() {
              try {
                console.log('Connexion à Legion Hosting...');
                await sftp.connect(config);
                console.log('Connexion établie. Recherche des fichiers Wurm...');
                
                // 1. Récupération du fichier top_layer.map
                const mapPath = await findFile('.', 'top_layer.map');
                if (mapPath) {
                  console.log(`Fichier localisé : ${mapPath}`);
                  await sftp.fastGet(mapPath, './sqlite_db/sqlite/top_layer.map');
                  console.log('top_layer.map téléchargé.');
                } else {
                  throw new Error('top_layer.map introuvable.');
                }
                
                // 2. Récupération du fichier wurmzones.db
                const zonesPath = await findFile('.', 'wurmzones.db');
                if (zonesPath) {
                  console.log(`Fichier localisé : ${zonesPath}`);
                  await sftp.fastGet(zonesPath, './sqlite_db/sqlite/wurmzones.db');
                  console.log('wurmzones.db téléchargé.');
                } else {
                  throw new Error('wurmzones.db introuvable.');
                }
                
                console.log('Tous les fichiers requis ont été rapatriés avec succès !');
              } catch (err) {
                console.error('Erreur critique:', err.message);
                process.exit(1);
              } finally {
                await sftp.end();
              }
            }
            
            return main();

      # Vérification de sécurité
      - name: Verify files position
        run: |
          if [ -s "./sqlite_db/sqlite/top_layer.map" ] && [ -s "./sqlite_db/sqlite/wurmzones.db" ]; then
            echo "Succès absolu : Les fichiers de base de données sont prêts."
          else
            echo "Erreur : Des fichiers indispensables sont manquants ou vides."
            exit 1
          fi

      # Commande Java nettoyée (sans l'argument properties de trop)
      - name: Run WurmMapGen
        run: |
          java -jar WurmMapGen.jar

      # Préparation du site
      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      # Déploiement final en ligne
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4







