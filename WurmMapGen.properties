# ------------------------ #
# WurmMapGen Configuration #
# ------------------------ #

# Name of the server
serverName=[QC/FR/CAN] QBC Doriath |PVE | MODS 4 K 2025

# Server paths (CORRIGÉS POUR GITHUB CLOUD)
# ------------
wurmMapLocation=./sqlite_db
saveLocation=.
outputDataDir=./data/
outputTilesDir=./images/

# ACTIVATION DES LOGS
verbose=true
forceRedraw=false

# Realtime (RÉALIGNÉ STRICTEMENT POUR ÉVITER LE CRASH JAVA)
# --------
enableRealtimeMarkers=false
rmiHost=localhost
rmiPort=8080

# Map Display & Layers
# --------------------
markerType=2
showPlayers=false
showDeeds=true
showGuardTowers=true
showStructures=true
showPortals=true

# Map Generation
# --------------
mapGeneratorThreads=2
mapTileSize=256
mapGenerateShading=true
mapShadingModifier=1.0
mapShadePaths=true
mapGenerateWater=true
mapGenerateBridges=true


