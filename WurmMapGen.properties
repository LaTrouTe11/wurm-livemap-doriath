### Configuration de génération de carte Wurm Unlimited pour GitHub Actions

serverName=\[QC/FR/CAN\] QBC Doriath  
wurmMapLocation=.  
saveLocation=. 

### Dossiers et fichiers sources téléchargés depuis Legion Hosting

dbDir=./sqlite/  
zonesDb=wurmzones.db  
itemsDb=wurmitems.db  
playersDb=wurmplayers.db 

### Paramètres de dimension de la carte (4k)

actualMapSize=4096  
mapTileSize=256  
mapMaxZoom=5  
mapMinZoom=0  
nativeZoom=5 

### Type de marqueurs (2 = Génération de fichiers JSON statiques indispensables pour GitHub Pages)

markerType=2 

### Désactivation des fonctionnalités dynamiques/serveur incompatibles avec GitHub

enableRealtimeMarkers=false  
usePHP=false  
rmiHost=localhost  
rmiPort=7220
