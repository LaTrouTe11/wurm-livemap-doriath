# ------------------------ #
# WurmMapGen Configuration #
# ------------------------ #

# Name of the server
serverName=[QC/FR/CAN] QBC Doriath |PVE | MODS 8 K 2025

# Server paths (CORRIGÉS POUR GITHUB)
# ------------
# Indique à l'outil de lire la carte téléchargée dans le dossier cloud
wurmMapLocation=./sqlite_db

# Indique à l'outil d'enregistrer les résultats dans vos dossiers GitHub
saveLocation=.

# Realtime
# --------
enableRealtimeMarkers=false
rmiHost=localhost
rmiPort=8080

# Map Display
# -----------
markerType=2

# Map Layers
# ----------
showPlayers=false
showDeeds=true
showGuardTowers=true
showStructures=true
showPortals=true

# Map Generation
# --------------
mapGeneratorThreads=2
mapTileSize=256
mapGenerateShading=true
mapShadingModifier=1.0
mapShadePaths=true
mapGenerateWater=true
mapGenerateBridges=true

